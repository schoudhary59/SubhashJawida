<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#060b17"/>
<title>SafeStreet AI — Montgomery, AL</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#060b17;--bg1:#0a1220;--bg2:#0e1a2e;--bg3:#13223d;
  --bd0:#1a2d47;--bd1:#1e3a5f;--bd2:#2a4a73;
  --tx0:#f0f6ff;--tx1:#8fadc8;--tx2:#4a6785;--tx3:#2a3f54;
  --red:#e84040;--red2:#ff6060;--redglow:rgba(232,64,64,0.4);
  --grn:#22d47a;--grn2:#15a85c;--grndark:#0a2918;
  --amb:#f5a623;--amb2:#ffcc55;--ambdark:#291800;
  --blu:#3b8bff;--blu2:#60a5fa;--bludark:#0a1a3d;
  --pur:#9b5cf6;--teal:#14b8a6;--cyan:#06b6d4;
  --font:'Outfit',sans-serif;--mono:'DM Mono',monospace;--display:'Syne',sans-serif;
  --glass-bg:rgba(6,11,23,.88);
  --glass-border:rgba(30,58,95,.7);
}
html,body,#root{height:100%;background:var(--bg0);color:var(--tx0);font-family:var(--font);overflow:hidden}
*::-webkit-scrollbar{width:3px}*::-webkit-scrollbar-thumb{background:var(--bd1);border-radius:2px}
.page{height:calc(100dvh - 58px);overflow-y:auto;position:relative;overscroll-behavior:contain}
.map-page{height:calc(100dvh - 58px);position:relative;overflow:hidden}
/* NAV */
.nav{display:flex;background:rgba(6,11,23,.97);border-top:1px solid var(--bd0);height:58px;padding-bottom:env(safe-area-inset-bottom);z-index:200;flex-shrink:0;backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:0;cursor:pointer;padding:6px 2px;position:relative;transition:all .2s}
.nav-btn .ni{font-size:17px;transition:transform .2s}
.nav-btn .nl{font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--tx2);font-family:var(--display)}
.nav-btn.on .nl{color:var(--blu2)}
.nav-btn.on .ni{transform:translateY(-2px)}
.nav-btn.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--blu2);border-radius:1px}
.nav-btn .n-dot{position:absolute;top:6px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd0);border-radius:16px;padding:16px}
.card-sm{background:var(--bg2);border:1px solid var(--bd0);border-radius:12px;padding:12px}
.glass{background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px}
/* INPUTS */
.inp{width:100%;background:var(--bg1);border:1px solid var(--bd1);border-radius:12px;padding:13px 14px;color:var(--tx0);font-family:var(--font);font-size:14px;outline:none;transition:border .2s,box-shadow .2s}
.inp:focus{border-color:var(--blu);box-shadow:0 0 0 3px rgba(59,139,255,.1)}
.inp::placeholder{color:var(--tx2)}
/* BUTTONS */
.btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px}
.btn:active{transform:scale(.97)}
.btn-blue{background:linear-gradient(135deg,var(--blu),#2563eb)}
.btn-blue:hover{background:linear-gradient(135deg,#4a9bff,var(--blu))}
.btn-green{background:linear-gradient(135deg,var(--grn2),#0d9e56)}
.btn-red{background:linear-gradient(135deg,var(--red),#c13030)}
.btn-ghost{background:transparent;border:1px solid var(--bd1);color:var(--tx1)}
.btn:disabled{background:var(--bd0);color:var(--tx2);cursor:not-allowed}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-red{background:rgba(232,64,64,.15);color:var(--red2)}
.b-grn{background:rgba(34,212,122,.15);color:var(--grn)}
.b-amb{background:rgba(245,166,35,.15);color:var(--amb2)}
.b-blu{background:rgba(59,139,255,.15);color:var(--blu2)}
.b-pur{background:rgba(155,92,246,.15);color:var(--pur)}
.b-teal{background:rgba(20,184,166,.15);color:var(--teal)}
/* SOS BUTTON */
.sos-btn{position:fixed;top:14px;right:14px;z-index:1000;width:58px;height:58px;border-radius:50%;background:var(--red);border:3px solid var(--red2);color:#fff;font-weight:900;font-size:12px;letter-spacing:1px;cursor:pointer;font-family:var(--display);box-shadow:0 0 24px var(--redglow),0 0 0 0 var(--red);display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none}
.sos-btn.counting{animation:sosPulse .6s infinite alternate;border-color:#fff}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sosPulse{from{box-shadow:0 0 20px var(--redglow)}to{box-shadow:0 0 50px rgba(255,80,80,.8),0 0 80px rgba(255,0,0,.3)}}
@keyframes alertGlow{from{border-color:rgba(232,64,64,.2);box-shadow:none}to{border-color:var(--red);box-shadow:0 0 30px rgba(232,64,64,.25)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wave{0%,80%,100%{transform:scaleY(.5);opacity:.4}40%{transform:scaleY(1);opacity:1}}
@keyframes bpmPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes ripple{from{transform:scale(.8);opacity:.7}to{transform:scale(2.6);opacity:0}}
@keyframes barGrow{from{height:0}to{height:var(--h)}}
@keyframes dialFill{from{stroke-dashoffset:var(--start)}to{stroke-dashoffset:var(--end)}}
@keyframes statusIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scanLine{0%{top:0;opacity:.8}100%{top:100%;opacity:0}}
@keyframes verticalScan{0%{top:0;opacity:1}100%{top:100%;opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fade-up{animation:fadeUp .35s ease both}
.fade-in{animation:fadeIn .3s ease both}
.slide-in{animation:slideIn .3s ease both}
/* STATUS ROWS */
.st-row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:12px;border:1px solid var(--bd0);background:var(--bg1);transition:all .6s}
.st-row.active{background:rgba(245,166,35,.06);border-color:rgba(245,166,35,.3);animation:alertGlow 1.5s ease infinite alternate}
.st-row.done{background:var(--grndark);border-color:rgba(34,212,122,.25)}
/* SPINNER */
.spin{width:18px;height:18px;border:2px solid var(--bd1);border-top-color:var(--blu);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
/* RISK COLORS */
.r-low{color:var(--grn)}.r-mod{color:var(--amb)}.r-high{color:var(--red)}.r-crit{color:#ff2020}
/* CHIP */
.chip{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--bd1);color:var(--tx1);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip:hover,.chip.on{border-color:var(--blu2);color:var(--blu2);background:rgba(59,139,255,.1)}
/* MAP MARKERS override */
.leaflet-popup-content-wrapper{background:var(--bg2)!important;border:1px solid var(--bd1)!important;border-radius:12px!important;color:var(--tx0)!important;box-shadow:0 4px 24px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:var(--bg2)!important}
.leaflet-popup-close-button{color:var(--tx1)!important}
/* BPM DISPLAY */
.bpm-num{font-family:var(--mono);font-size:52px;font-weight:400;line-height:1;transition:all .3s}
.bpm-wave{display:flex;align-items:center;gap:2px;height:30px}
.bpm-bar{width:3px;border-radius:2px;background:var(--grn);animation:wave 1.2s ease-in-out infinite}
/* CAMERA */
#health-video{width:100%;border-radius:12px;object-fit:cover;transform:scaleX(-1)}
.cam-overlay{position:relative}
.cam-overlay::after{content:'';position:absolute;inset:0;border-radius:12px;border:2px solid var(--grn);animation:alertGlow 2s ease infinite alternate;pointer-events:none}
.cam-overlay.warning::after{border-color:var(--red)}
/* NEARBY CARD */
.nearby-item{display:flex;gap:12px;padding:14px;background:var(--bg1);border:1px solid var(--bd0);border-radius:12px;cursor:pointer;transition:all .2s;align-items:center}
.nearby-item:hover{border-color:var(--bd2);background:var(--bg3)}
.nearby-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
/* SECTION HEADER */
.sec-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--tx2);margin-bottom:10px;text-transform:uppercase}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg1);padding:4px;border-radius:12px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border:none;background:0;border-radius:9px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .2s}
.tab.on{background:var(--bg2);color:var(--tx0);box-shadow:0 1px 6px rgba(0,0,0,.4)}
/* CHECKLIST */
.chk-item{display:flex;gap:12px;padding:13px;border-radius:12px;cursor:pointer;border:1px solid var(--bd0);background:var(--bg1);transition:all .2s;align-items:flex-start}
.chk-item.done{background:var(--grndark);border-color:rgba(34,212,122,.2)}
.chk-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;margin-top:1px}
.chk-item.done .chk-box{background:var(--grn);border-color:var(--grn)}
/* CHAT */
.msg{padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.65;max-width:90%;animation:fadeUp .25s ease}
.msg.usr{background:var(--bludark);border:1px solid var(--bd2);margin-left:auto;border-bottom-right-radius:4px}
.msg.ai{background:var(--bg2);border:1px solid var(--bd0);border-bottom-left-radius:4px}
/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:3px}
.c-bar{border-radius:3px 3px 0 0;transition:height 1s ease;min-height:3px}
/* PROGRESS */
.prog-track{height:5px;background:var(--bg1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease}
/* HOTSPOT ROW */
.hs-row{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd0)}
.hs-row:last-child{border-bottom:none}
.hs-score{font-family:var(--mono);font-size:22px;font-weight:400;min-width:38px;text-align:center}
/* EMERGENCY BG */
.em-bg{background:radial-gradient(ellipse at center,#150505 0%,var(--bg0) 70%)}
/* HEALTH MONITOR BG */
.hm-bg{background:radial-gradient(ellipse at top,#050d1a 0%,var(--bg0) 60%)}
/* PULSE RING */
.pulse-ring{position:absolute;border-radius:50%;animation:ripple 1.5s ease-out infinite}
/* KPI CARD */
.kpi{background:var(--bg2);border:1px solid var(--bd0);border-radius:14px;padding:14px;text-align:center}
.kpi-val{font-family:var(--mono);font-size:28px;font-weight:400;line-height:1.1}
.kpi-lbl{font-size:10px;color:var(--tx2);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
/* AI TYPING */
.ai-typing{display:inline-flex;gap:4px;align-items:center;padding:4px 0}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--blu2)}
/* RESPONDER CARD */
.resp-card{background:var(--bg1);border:1px solid var(--bd0);border-radius:14px;padding:14px;transition:all .2s}
.resp-card:hover{border-color:var(--blu2);background:var(--bg2)}
/* PAGE HEADER */
.pg-hdr{padding:16px 16px 0;display:flex;align-items:center;gap:12px;margin-bottom:4px}
.pg-back{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd0);color:var(--tx1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>

/* ═══════════════════ CLAUDE AI HELPER ═══════════════════ */
async function callClaude(prompt,systemPrompt='You are SafeStreet AI, an expert civic safety assistant for Montgomery, AL.'){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    return data.content?.[0]?.text||'Unable to get AI response.';
  }catch(e){
    return 'AI service temporarily unavailable. Please try again.';
  }
}

/* ═══════════════════ SOS BUTTON ═══════════════════ */
function SOSBtn({onTrigger}){
  const[hold,setHold]=useState(false);
  const[cnt,setCnt]=useState(3);
  const ref=useRef(null);
  function start(e){e.preventDefault();setHold(true);setCnt(3);ref.current=setInterval(()=>{setCnt(c=>{if(c<=1){clearInterval(ref.current);setHold(false);onTrigger();return 3}return c-1})},1000)}
  function stop(){if(ref.current)clearInterval(ref.current);setHold(false);setCnt(3)}
  return(<button className={`sos-btn${hold?' counting':''}`}
    onMouseDown={start}onMouseUp={stop}onMouseLeave={stop}
    onTouchStart={start}onTouchEnd={stop}
    style={{fontSize:hold?22:12,background:hold?`conic-gradient(var(--red2) ${(3-cnt)/3*360}deg,#4a0000 0deg)`:undefined}}>
    {hold?cnt:'SOS'}
  </button>);
}

      mk.bindPopup(`<div style="font-family:Outfit,sans-serif;min-width:190px"><b style="color:#f0f6ff;font-size:13px">${h.name}</b><br><span style="color:#8fadc8;font-size:11px">📍 ${h.addr}</span><br><span style="color:#22d47a;font-size:11px">⏱ ${h.eta} away</span>${h.trauma?'<br><span style="background:rgba(232,64,64,.2);color:#ff6060;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700">🚑 TRAUMA CENTER</span>':''}<br><a href="${navUrl(h.lat,h.lng)}" target="_blank" style="display:block;margin-top:8px;padding:7px;background:#1e3a5f;border-radius:8px;color:#60a5fa;text-align:center;font-size:12px;text-decoration:none;font-weight:700">📍 Navigate</a></div>`);

    });
    POLICE.forEach(p=>{
      const icon=L.divIcon({html:`<div style="width:34px;height:34px;background:#1e3a5f;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;border:2px solid #3b8bff;box-shadow:0 0 14px rgba(59,139,255,.5)">👮</div>`,iconSize:[34,34],iconAnchor:[17,17],className:''});
      const mk=L.marker([p.lat,p.lng],{icon}).addTo(m);
      mk.bindPopup(`<div style="font-family:Outfit,sans-serif;min-width:190px"><b style="color:#f0f6ff;font-size:13px">${p.name}</b><br><span style="color:#8fadc8;font-size:11px">📍 ${p.addr}</span><br><span style="color:#60a5fa;font-size:11px">⏱ ${p.eta} away</span><br><a href="tel:${p.phone}" style="display:block;margin-top:8px;padding:7px;background:#0a1a3d;border-radius:8px;color:#60a5fa;text-align:center;font-size:12px;text-decoration:none;font-weight:700">📞 ${p.phone}</a></div>`);
      polMarkers.current.push(mk);
    });
  }

  function toggleLayer(type){
    const markers=type==='hospitals'?hosMarkers.current:polMarkers.current;
    const newLayers={...layers,[type]:!layers[type]};
    setLayers(newLayers);
    markers.forEach(mk=>{newLayers[type]?mk.addTo(inst.current):inst.current.removeLayer(mk)});
  }

  return(<div style={{height:'100%',position:'relative'}}>
    <div id="the-map" style={{height:'100%',width:'100%'}}/>
    <SOSBtn onTrigger={()=>setPage('sos')}/>

        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <img src={LOGO_SVG} style={{width:34,height:34,objectFit:"contain"}} alt="SafeStreet AI"/>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:'var(--tx0)',fontFamily:'var(--display)',letterSpacing:'-.2px'}}>SafeStreet AI</div>
            <div style={{fontSize:9,color:'var(--tx2)',letterSpacing:'.3px'}}>Montgomery, AL · Live</div>

        <div style={{display:'flex',gap:5}}>

    <div style={{position:'absolute',top:72,left:14,right:82,zIndex:500,display:'flex',flexDirection:'column',gap:5}}>
      {HAZARDS.slice(0,2).map(h=>(
        <div key={h.id} className="glass" style={{padding:'7px 11px',borderLeft:`3px solid ${h.sev==='critical'?'var(--red)':h.sev==='high'?'var(--amb)':'var(--blu)'}`,cursor:'pointer'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:13}}>{h.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:'var(--tx1)',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{h.desc}</div>

      <button onClick={()=>setShowLayers(x=>!x)} style={{width:38,height:38,borderRadius:10,background:'var(--bg2)',border:'1px solid var(--bd1)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>🗂️</button>

      <button onClick={()=>inst.current?.setView(CENTER,12)} style={{width:38,height:38,borderRadius:10,background:'var(--bg2)',border:'1px solid var(--bd1)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⊙</button>

/* ═══════════════════ SCREEN 2: ROUTE SAFETY CHECK (AI-POWERED) ═══════════════════ */
function RouteCheck(){
  const[org,setOrg]=useState('');
  const[dst,setDst]=useState('');
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[useAI,setUseAI]=useState(true);

  const SUGG=['Downtown Montgomery','Atlanta Hwy & Eastern Blvd','Baptist Health','Bell Rd & Atlanta Hwy','Montgomery Airport','Jackson Hospital','Maxwell AFB'];

  async function check(){
    if(!org||!dst)return;
    setLoading(true);setResult(null);

    if(useAI){
      const hour=new Date().getHours();
      const timeOfDay=hour<6?'Late night (low traffic)':hour<9?'Morning rush hour':hour<16?'Daytime':hour<19?'Evening rush hour':'Night';
      const activeHazards=HAZARDS.slice(0,2).map(h=>h.desc).join('; ');
      
      const prompt=`You are SafeStreet AI analyzing route safety for Montgomery, AL.

Route: FROM "${org}" TO "${dst}"
Time: ${timeOfDay} (${hour}:00)
Active hazards: ${activeHazards}
Historical crash data: Atlanta Hwy corridor has 43 crashes (highest), Bell Rd 31, Zelda Rd 27, Eastern Blvd 29.

Respond ONLY with a JSON object (no markdown, no explanation outside JSON):
{
  "score": <0-100 risk number>,
  "level": "<LOW|MODERATE|HIGH|CRITICAL>",
  "explanation": "<2 sentence route risk summary>",
  "risks": ["<risk 1>", "<risk 2>", "<risk 3>"],
  "recommendation": "<specific alternate route or safety tip>",
  "hasAlternate": <true|false>
}`;

      const aiText=await callClaude(prompt,'You are a route safety AI. Respond ONLY with valid JSON, no extra text or markdown.');
      try{
        const cleaned=aiText.replace(/```json|```/g,'').trim();
        const parsed=JSON.parse(cleaned);
        setResult({score:parsed.score,level:parsed.level,color:riskColor(parsed.score),exp:parsed.explanation,risks:parsed.risks,rec:parsed.recommendation,alt:parsed.hasAlternate});
      }catch{
        // Fallback to mock data
        const MOCK=[
          {score:73,level:'HIGH',color:'var(--red)',exp:"Route passes Atlanta Hwy & Eastern Blvd — Montgomery's #1 crash hotspot. Rain advisory and PM rush hour significantly elevate risk.",risks:['🌧️ Active rain advisory — wet roads','🕐 Peak rush hour 5:00–6:30 PM','⚠️ High-crash intersection at Eastern Blvd'],rec:"Consider I-65 S ramp via Eastern Blvd to bypass Atlanta Hwy corridor.",alt:true},
          {score:41,level:'MODERATE',color:'var(--amb)',exp:"Route has moderate historical crash density. Rain advisory adds some risk but no active incidents on this corridor.",risks:['🌧️ Light rain expected en route','🚧 Construction slowdown near Exit 6','🌙 Reduced visibility after sunset'],rec:"Stay within speed limit and increase following distance on wet roads.",alt:false},
          {score:18,level:'LOW',color:'var(--grn)',exp:"This route has minimal historical crash density and no active hazards. Clear driving conditions expected.",risks:['✅ No active incidents reported','📍 Low historical crash density','☀️ Clear weather forecast'],rec:"Safe to proceed. Enjoy your drive!",alt:false},
        ];
        setResult(MOCK[Math.floor(Math.random()*MOCK.length)]);
      }
    } else {
      await new Promise(r=>setTimeout(r,2200));
      const MOCK=[
        {score:73,level:'HIGH',color:'var(--red)',exp:"Route passes Atlanta Hwy & Eastern Blvd — Montgomery's #1 crash hotspot.",risks:['🌧️ Active rain advisory','🕐 Peak rush hour','⚠️ High-crash intersection'],rec:"Consider I-65 S ramp to bypass Atlanta Hwy corridor.",alt:true},
        {score:41,level:'MODERATE',color:'var(--amb)',exp:"Moderate historical crash density. Rain adds some risk.",risks:['🌧️ Light rain expected','🚧 Construction slowdown','🌙 Reduced visibility'],rec:"Increase following distance on wet roads.",alt:false},
        {score:18,level:'LOW',color:'var(--grn)',exp:"Minimal historical crash density. Clear conditions expected.",risks:['✅ No active incidents','📍 Low crash density','☀️ Clear forecast'],rec:"Safe to proceed!",alt:false},
      ];
      setResult(MOCK[Math.floor(Math.random()*MOCK.length)]);
    }
    setLoading(false);
  }

  const C=2*Math.PI*54;
  const dashOff=result?C-(result.score/100)*C:C;

  return(<div className="page fade-up" style={{padding:16}}>
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
        <img src={LOGO_SVG} style={{width:30,height:30,objectFit:"contain"}} alt=""/>
        <h1 style={{fontSize:22,fontWeight:800,fontFamily:'var(--display)'}}>Route Safety Check</h1>
      </div>
      <p style={{fontSize:12,color:'var(--tx2)'}}>Powered by Claude AI · Montgomery Open Data · NWS Live</p>
    </div>
    <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}}>
      {['🏛️ City Data','🌐 Bright Data','🧠 Claude AI','🌧️ NWS Live'].map(b=>(
        <span key={b} className="badge b-blu">{b}</span>
      ))}
    </div>
    {/* AI toggle */}
    <div className="card-sm" style={{marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:13,fontWeight:600}}>🧠 Claude AI Analysis</div>
        <div style={{fontSize:11,color:'var(--tx2)'}}>Real-time route intelligence</div>
      </div>
      <div onClick={()=>setUseAI(x=>!x)} style={{width:44,height:24,borderRadius:12,background:useAI?'var(--grn2)':'var(--bd1)',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
        <div style={{position:'absolute',top:3,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s',left:useAI?23:3}}/>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
      <div style={{position:'relative'}}>
        <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14}}>📍</span>
        <input className="inp" value={org} onChange={e=>setOrg(e.target.value)} placeholder="Starting from..." style={{paddingLeft:40}}/>
      </div>
      <div style={{position:'relative'}}>
        <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14}}>🎯</span>
        <input className="inp" value={dst} onChange={e=>setDst(e.target.value)} placeholder="Going to..." style={{paddingLeft:40}}/>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {SUGG.slice(0,5).map(s=>(
          <button key={s} className="chip" onClick={()=>!org?setOrg(s):setDst(s)}>{s}</button>
        ))}
      </div>
      <button className="btn btn-blue" onClick={check} disabled={!org||!dst||loading}>
        {loading?<><div className="spin"/>&nbsp;{useAI?'Claude Analyzing...':'Analyzing...'}</>:<>🔍 Check Route Safety</>}
      </button>
    </div>
    {loading&&<div className="card fade-up" style={{textAlign:'center',padding:28}}>
      <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:14}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--blu2)',animation:`wave 1.2s ease-in-out ${i*.15}s infinite`}}/>)}
      </div>
      <div style={{fontSize:13,color:'var(--tx1)',fontWeight:600,marginBottom:4}}>{useAI?'Claude AI is analyzing your route...':'Analyzing route data...'}</div>
      <div style={{fontSize:12,color:'var(--tx2)'}}>Scanning {HEAT_PTS.length} historical crashes,<br/>live weather & active hazards...</div>
    </div>}
    {result&&<div className="fade-up">
      <div className="card" style={{textAlign:'center',marginBottom:12,borderTop:`3px solid ${result.color}`,paddingTop:20}}>
        <svg width="140" height="140" viewBox="0 0 140 140" style={{overflow:'visible',marginBottom:8}}>
          <circle cx="70" cy="70" r="54" fill="none" stroke="var(--bg1)" strokeWidth="11" strokeLinecap="round"/>
          <circle cx="70" cy="70" r="54" fill="none" stroke={result.color} strokeWidth="11" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset={dashOff} transform="rotate(-90 70 70)"
            style={{transition:'stroke-dashoffset 1.5s ease, stroke 1s ease'}}/>
          {result.score>55&&<circle cx="70" cy="70" r="22" fill={result.color} fillOpacity=".1">
            <animate attributeName="r" values="22;38;22" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values=".4;0;.4" dur="2s" repeatCount="indefinite"/>
          </circle>}
          <text x="70" y="63" textAnchor="middle" fill="var(--tx0)" fontSize="30" fontWeight="600" fontFamily="DM Mono">{result.score}</text>
          <text x="70" y="82" textAnchor="middle" fill={result.color} fontSize="11" fontWeight="700" fontFamily="Syne" letterSpacing="1">{result.level} RISK</text>
        </svg>
        <p style={{fontSize:13,color:'var(--tx1)',lineHeight:1.65}}>{result.exp}</p>
        {useAI&&<div style={{marginTop:8,fontSize:10,color:'var(--tx2)',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:'var(--grn)',display:'inline-block'}}/>
          Analysis by Claude AI
        </div>}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="sec-hdr">TOP RISK FACTORS</div>
        {result.risks.map((r,i)=><div key={i} style={{padding:'9px 0',borderBottom:i<2?'1px solid var(--bd0)':'none',fontSize:13,color:'var(--tx1)',lineHeight:1.5}}>{r}</div>)}
      </div>
      <div className="card" style={{marginBottom:12,background:'var(--bludark)',borderColor:'var(--bd2)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--blu2)',marginBottom:6,letterSpacing:'1px'}}>AI RECOMMENDATION</div>
        <p style={{fontSize:13,color:'#93c5fd',lineHeight:1.6}}>💡 {result.rec}</p>
      </div>
      {result.alt&&<button className="btn btn-green">🗺️ View Safer Alternate Route</button>}
    </div>}
  </div>);
}

/* ═══════════════════ SCREEN 3: SOS ═══════════════════ */
function SOSScreen(){
  const[rows,setRows]=useState([
    {id:'loc',icon:'📍',msg:'Getting your GPS location...',state:'active'},
    {id:'911',icon:'🚨',msg:'Connecting to 911...',state:'idle'},
    {id:'fam',icon:'👨‍👩‍👧',msg:'Notifying family contacts...',state:'idle'},
    {id:'resp',icon:'🦺',msg:'Finding nearby responders...',state:'idle'},
    {id:'hosp',icon:'🏥',msg:'Locating nearest emergency room...',state:'idle'},
    {id:'pol',icon:'👮',msg:'Alerting nearest police station...',state:'idle'},
  ]);
  const[cancelled,setCancelled]=useState(false);
  const[respFound,setRespFound]=useState(false);
  const[allDone,setAllDone]=useState(false);

  const UPDATES=[
    s=>s.map((r,i)=>i===0?{...r,state:'done',msg:'✅ Location: Atlanta Hwy, Montgomery AL (32.38°N)'}:i===1?{...r,state:'active'}:r),
    s=>s.map((r,i)=>i===1?{...r,state:'done',msg:'✅ 911 connected — dispatcher on line'}:i===2?{...r,state:'active'}:r),
    s=>s.map((r,i)=>i===2?{...r,state:'done',msg:'✅ 3 family contacts notified via SMS'}:i===3?{...r,state:'active'}:r),
    s=>{setRespFound(true);return s.map((r,i)=>i===3?{...r,state:'done',msg:'✅ 2 responders dispatched (0.3 mi, 0.5 mi)'}:i===4?{...r,state:'active'}:r)},
    s=>s.map((r,i)=>i===4?{...r,state:'done',msg:'✅ Baptist Health Montgomery — 4 min away'}:i===5?{...r,state:'active'}:r),

/* ═══════════════════ SCREEN 5: HEALTH MONITOR ═══════════════════ */
function HealthMonitor({setPage}){
  const[bpm,setBpm]=useState(72);
  const[monitoring,setMonitoring]=useState(false);
  const[cameraOn,setCameraOn]=useState(false);
  const[status,setStatus]=useState('idle');
  const[alertTriggered,setAlertTriggered]=useState(false);
  const[timeOn,setTimeOn]=useState(0);
  const[history,setHistory]=useState([]);
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const bpmInterval=useRef(null);
  const timerRef=useRef(null);

  function startCamera(){
    if(navigator.mediaDevices?.getUserMedia){
      navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}})
        .then(stream=>{
          streamRef.current=stream;
          if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
          setCameraOn(true);startMonitoring();
        })
        .catch(()=>{setCameraOn('simulated');startMonitoring();});
    }else{setCameraOn('simulated');startMonitoring();}
  }

  function startMonitoring(){
    setMonitoring(true);setStatus('normal');setTimeOn(0);setHistory([]);
    let t=0;let bpmVal=72;
    timerRef.current=setInterval(()=>setTimeOn(x=>x+1),1000);
    bpmInterval.current=setInterval(()=>{
      t+=1;
      if(t<8){bpmVal=70+Math.floor(Math.random()*10-5);setStatus('normal');}
      else if(t<14){bpmVal=95+Math.floor(Math.random()*15);setStatus('warning');}
      else if(t<20){bpmVal=145+Math.floor(Math.random()*20);setStatus('critical');}
      else{bpmVal=30+Math.floor(Math.random()*8);setStatus('critical');if(!alertTriggered&&t===20){setAlertTriggered(true);setStatus('alert');}}
      setBpm(bpmVal);setHistory(h=>[...h.slice(-29),bpmVal]);
    },1000);
  }

  function stopMonitoring(){
    setMonitoring(false);setStatus('idle');
    clearInterval(bpmInterval.current);clearInterval(timerRef.current);
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    setCameraOn(false);
  }

  useEffect(()=>()=>{
    clearInterval(bpmInterval.current);clearInterval(timerRef.current);
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
  },[]);

  const bpmColor=bpm<50||bpm>140?'var(--red)':bpm<60||bpm>100?'var(--amb)':'var(--grn)';
  const maxH=Math.max(...history,1);
  const formatTime=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  if(status==='alert'||alertTriggered)return(<div className="page em-bg fade-up" style={{padding:16}}>
    <div style={{textAlign:'center',marginBottom:20}}>
      <div style={{fontSize:52,animation:'sosPulse .6s infinite alternate',display:'inline-block',marginBottom:8}}>💔</div>
      <h1 style={{fontSize:24,fontWeight:900,color:'var(--red)',fontFamily:'var(--display)',marginBottom:4}}>CARDIAC ALERT</h1>
      <p style={{fontSize:13,color:'var(--tx2)'}}>Abnormal heart rate detected. Emergency contacts notified.</p>
    </div>
    <div className="card fade-up" style={{textAlign:'center',marginBottom:12,borderColor:'rgba(232,64,64,.4)',background:'rgba(30,4,4,.8)'}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--red)',letterSpacing:1,marginBottom:8}}>DETECTED BPM</div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14}}>
        <div className="bpm-num" style={{color:'var(--red)',fontSize:64}}>{bpm}</div>
        <div><div style={{fontSize:12,color:'var(--red)',fontWeight:700}}>CRITICAL</div><div style={{fontSize:11,color:'var(--tx2)'}}>{bpm<50?'TOO LOW':'TOO HIGH'}</div></div>
      </div>
      <div style={{fontSize:11,color:'var(--tx2)',marginTop:6}}>Normal range: 60–100 BPM</div>
    </div>
    <div className="card" style={{marginBottom:12,background:'rgba(30,4,4,.8)',borderColor:'rgba(232,64,64,.3)'}}>
      <div className="sec-hdr" style={{color:'var(--red)'}}>EMERGENCY ACTIONS TAKEN</div>
      {['✅ 911 emergency call initiated','✅ Family contacts notified via SMS + live location','✅ MPD nearest patrol alerted','✅ Baptist Health Montgomery ER notified (1.2 mi)'].map((a,i)=>(
        <div key={i} style={{fontSize:13,color:'var(--grn)',padding:'7px 0',borderBottom:i<3?'1px solid var(--bd0)':'none'}}>{a}</div>
      ))}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      <a href="tel:911" style={{padding:13,background:'var(--red)',borderRadius:11,color:'#fff',textAlign:'center',fontSize:13,fontWeight:700,textDecoration:'none',fontFamily:'var(--font)'}}>📞 Call 911</a>
      <button onClick={()=>setAlertTriggered(false)} className="btn btn-ghost" style={{fontSize:13}}>Cancel Alert</button>
    </div>
  </div>);

  return(<div className="page hm-bg fade-up" style={{padding:16}}>
    <div style={{marginBottom:16}}>
      <h1 style={{fontSize:22,fontWeight:800,fontFamily:'var(--display)',marginBottom:3}}>❤️ Driver Health Monitor</h1>
      <p style={{fontSize:12,color:'var(--tx2)'}}>AI cardiac monitoring via front camera (rPPG)</p>
    </div>
    {!monitoring&&<div className="card" style={{marginBottom:14,background:'var(--bludark)',borderColor:'var(--bd2)'}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--blu2)',marginBottom:8,letterSpacing:'1px'}}>HOW IT WORKS</div>
      {['📷 Front camera analyzes subtle facial color changes (rPPG)','💓 AI detects blood flow patterns to calculate real-time BPM','🚨 If BPM < 50 or > 140: automatic emergency alert to 911 + family','👮 Nearest police station and hospital notified immediately'].map((t,i)=>(
        <div key={i} style={{fontSize:12,color:'#93c5fd',lineHeight:1.6,paddingBottom:6,borderBottom:i<3?'1px solid rgba(59,139,255,.15)':'none',marginBottom:6}}>{t}</div>
      ))}
    </div>}
    {monitoring&&<>
      <div className={`cam-overlay${status==='critical'||status==='warning'?' warning':''}`} style={{marginBottom:12,position:'relative'}}>
        {cameraOn===true?
          <video ref={videoRef} autoPlay muted playsInline style={{width:'100%',height:160,borderRadius:12,objectFit:'cover',transform:'scaleX(-1)',background:'#000'}}/>:
          <div style={{width:'100%',height:160,borderRadius:12,background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,border:`2px solid ${bpmColor}`,overflow:'hidden'}}>
            <span style={{fontSize:36}}>👤</span>
            <span style={{fontSize:11,color:'var(--tx2)'}}>Simulation Mode</span>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'2px',background:bpmColor,animation:'scanLine 1.5s linear infinite',opacity:.7}}/>
          </div>
        }
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:80,height:100,border:`2px solid ${bpmColor}`,borderRadius:'40px/50px',boxShadow:`0 0 20px ${bpmColor}44`,pointerEvents:'none',transition:'border-color .5s'}}/>
      </div>
      {/* BPM Display */}
      <div className="card" style={{marginBottom:12,textAlign:'center',borderColor:bpmColor==='var(--grn)'?'rgba(34,212,122,.3)':bpmColor==='var(--amb)'?'rgba(245,166,35,.3)':'rgba(232,64,64,.3)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:8}}>

            <div style={{fontSize:11,color:bpmColor,fontWeight:700,letterSpacing:'.5px'}}>BPM</div>
            <div style={{fontSize:12,color:'var(--tx2)',marginTop:2}}>{bpm<50?'⚠️ CRITICAL LOW':bpm<60?'LOW':bpm<100?'✅ NORMAL':bpm<120?'⚠️ ELEVATED':'🚨 CRITICAL HIGH'}</div>

        <div style={{display:'flex',alignItems:'flex-end',gap:2,height:32,justifyContent:'center'}}>
          {history.slice(-20).map((v,i)=>(

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        {[['Normal','60-100','var(--grn)'],['Elevated','100-140','var(--amb)'],['Critical','<50 / >140','var(--red)']].map(([l,r,c])=>(
          <div key={l} className="card-sm" style={{textAlign:'center',padding:10}}>
            <div style={{fontSize:10,fontWeight:700,color:c}}>{l}</div>
            <div style={{fontSize:10,color:'var(--tx2)'}}>{r}</div>
          </div>
        ))}
      </div>
    </>}
    {!monitoring?
      <button className="btn btn-blue" onClick={startCamera}>▶ Start Monitoring</button>:
      <button className="btn btn-ghost" onClick={stopMonitoring}>⏹ Stop Monitoring</button>
    }
  </div>);
}

/* ═══════════════════ SCREEN 6: CITY DASHBOARD ═══════════════════ */
function Dashboard(){
  const maxW=Math.max(...WEEKLY.map(w=>w.n));
  const maxH=Math.max(...HOURLY.map(h=>h.n));
  const[loaded,setLoaded]=useState(false);
  useEffect(()=>{setTimeout(()=>setLoaded(true),200)},[]);

  return(<div className="page fade-up" style={{padding:16}}>
    <div style={{marginBottom:16}}>
      <h1 style={{fontSize:22,fontWeight:800,fontFamily:'var(--display)',marginBottom:3}}>📊 City Safety Analytics</h1>
      <p style={{fontSize:12,color:'var(--tx2)'}}>Montgomery, AL · Montgomery Open Data Portal</p>
    </div>
    <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:14}}>
      {['🏛️ City Data','📡 Live','🔄 7-Day'].map(b=><span key={b} className="badge b-teal">{b}</span>)}
    </div>
    {/* KPI Grid */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
      {[['94','Total Crashes This Week','var(--red)','▲ 12%'],['3.8 min','Avg Response Time','var(--grn)','▼ 0.4 min'],['12','Active Hazard Alerts','var(--amb)','▲ 3'],['8','Responders Available','var(--blu2)','● Online']].map(([v,l,c,sub])=>(
        <div key={l} className="kpi" style={{textAlign:'left',padding:14}}>
          <div className="kpi-val" style={{color:c,fontSize:26}}>{v}</div>
          <div className="kpi-lbl" style={{textAlign:'left',marginBottom:3}}>{l}</div>
          <div style={{fontSize:10,color:'var(--tx3)'}}>{sub}</div>
        </div>
      ))}
    </div>
    {/* Weekly chart */}
    <div className="card" style={{marginBottom:14}}>
      <div className="sec-hdr">WEEKLY CRASH TREND</div>
      <div style={{display:'flex',alignItems:'flex-end',gap:6,height:80,marginBottom:6}}>
        {WEEKLY.map((w,i)=>(
          <div key={w.d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{fontSize:10,color:'var(--tx2)',marginBottom:3}}>{w.n}</div>
            <div style={{width:'100%',height:loaded?`${(w.n/maxW)*64}px`:0,background:w.n===Math.max(...WEEKLY.map(x=>x.n))?'var(--red)':'var(--blu)',borderRadius:'3px 3px 0 0',transition:`height ${.4+i*.08}s ease`,minHeight:2}}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:6,justifyContent:'space-between'}}>
        {WEEKLY.map(w=><div key={w.d} style={{flex:1,fontSize:9,color:'var(--tx2)',textAlign:'center'}}>{w.d}</div>)}
      </div>
    </div>
    {/* Hourly chart */}
    <div className="card" style={{marginBottom:14}}>
      <div className="sec-hdr">CRASH PATTERN BY HOUR</div>
      <div style={{display:'flex',alignItems:'flex-end',gap:1,height:60}}>
        {HOURLY.map((h,i)=>(
          <div key={h.h} style={{flex:1,height:loaded?`${Math.max(4,(h.n/maxH)*56)}px`:0,background:(h.h>=7&&h.h<=9)||(h.h>=16&&h.h<=18)?'var(--red)':'var(--bd2)',borderRadius:'2px 2px 0 0',transition:`height ${.3+i*.01}s ease`,cursor:'pointer'}} title={`${h.h}:00 — ${h.n} crashes`}/>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
        {['12am','6am','12pm','6pm','11pm'].map(t=><div key={t} style={{fontSize:9,color:'var(--tx2)'}}>{t}</div>)}
      </div>
      <div style={{marginTop:8,display:'flex',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--tx2)'}}><div style={{width:8,height:8,borderRadius:2,background:'var(--red)'}}/> Rush hours</div>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--tx2)'}}><div style={{width:8,height:8,borderRadius:2,background:'var(--bd2)'}}/> Other hours</div>
      </div>
    </div>
    {/* Hotspots */}
    <div className="card" style={{marginBottom:14}}>
      <div className="sec-hdr">TOP CRASH INTERSECTIONS</div>
      {HOTSPOTS.map((h,i)=>(
        <div key={i} className="hs-row">
          <div className="hs-score" style={{color:riskColor(h.score)}}>{h.score}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>{h.loc}</div>
            <div className="prog-track" style={{flex:1}}>
              <div className="prog-fill" style={{width:loaded?`${(h.score/87)*100}%`:0,background:riskColor(h.score)}}/>
            </div>
          </div>
          <div style={{fontSize:10,color:'var(--tx2)',minWidth:40,textAlign:'right'}}>{h.n} crashes</div>
        </div>
      ))}
    </div>
    {/* Active hazards */}
    <div className="card" style={{marginBottom:14}}>
      <div className="sec-hdr">ACTIVE HAZARD ALERTS</div>
      {HAZARDS.map((h,i)=>(
        <div key={h.id} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:i<HAZARDS.length-1?'1px solid var(--bd0)':'none'}}>
          <span style={{fontSize:16}}>{h.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--tx1)',lineHeight:1.5}}>{h.desc}</div>
            <div style={{fontSize:10,color:'var(--tx2)',marginTop:3}}>{h.time} · {h.src}</div>
          </div>
          <span className={`badge ${h.sev==='critical'?'b-red':h.sev==='high'?'b-amb':h.sev==='medium'?'b-pur':'b-grn'}`}>{h.sev.toUpperCase()}</span>
        </div>
      ))}
    </div>
    {/* Footer */}
    <div style={{paddingTop:12,borderTop:'1px solid var(--bd0)',textAlign:'center'}}>
      <div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>Data: Montgomery Open Data Portal · NWS · AL DOT</div>
      <img src={TEAM_LOGO} style={{width:80,height:'auto',opacity:.6,display:'block',margin:'0 auto 4px'}} alt="DeepBuild Warriors"/>
      <div style={{fontSize:9,color:'var(--tx3)'}}>Built by Team DeepBuild Warriors · WWV Hackathon 2026</div>
    </div>
  </div>);
}

/* ═══════════════════ SCREEN 7: POST ACCIDENT ASSISTANT (AI) ═══════════════════ */
function PostAccident(){
  const[tab,setTab]=useState('check');
  const[checks,setChecks]=useState([
    {id:1,t:'🚗 Move vehicle to safe area if possible',done:false},
    {id:2,t:'🔴 Turn on hazard lights',done:false},
    {id:3,t:'🩺 Check yourself and passengers for injuries',done:false},
    {id:4,t:'📞 Call 911 if anyone is injured',done:false},
    {id:5,t:'📷 Take photos of damage and scene',done:false},
    {id:6,t:'📋 Exchange insurance & driver info',done:false},
    {id:7,t:'👮 File police report (required in AL if >$250 damage)',done:false},
    {id:8,t:'📱 Notify your insurance company',done:false},
  ]);
  const[msgs,setMsgs]=useState([{role:'ai',t:"Hi! I'm SafeStreet AI. I'm here to help you through this accident. What do you need help with? You can ask about police reports, insurance claims, medical attention, or anything else."}]);
  const[inp,setInp]=useState('');
  const[typing,setTyping]=useState(false);

  async function send(){
    if(!inp.trim())return;
    const userMsg=inp.trim();
    setInp('');
    setMsgs(m=>[...m,{role:'user',t:userMsg}]);
    setTyping(true);
    const response=await callClaude(
      userMsg,
      'You are SafeStreet AI, a helpful post-accident assistant for Montgomery, AL. Keep responses concise (2-3 sentences max). Focus on practical, actionable advice for accident victims. Be calm and supportive.'
    );
    setTyping(false);
    setMsgs(m=>[...m,{role:'ai',t:response}]);
  }

  const done=checks.filter(c=>c.done).length;

  return(<div className="page fade-up" style={{padding:16}}>
    <div style={{marginBottom:14}}>
      <h1 style={{fontSize:20,fontWeight:800,fontFamily:'var(--display)',marginBottom:3}}>🏥 Post-Accident Hub</h1>
      <p style={{fontSize:12,color:'var(--tx2)'}}>Step-by-step guidance · AI-powered assistance</p>
    </div>
    <div className="tabs">
      {[['check','✅ Checklist'],['chat','🤖 AI Help'],['hosp','🏥 Hospitals'],['pol','👮 Police']].map(([k,l])=>(
        <button key={k} className={`tab${tab===k?' on':''}`} onClick={()=>setTab(k)}>{l}</button>
      ))}
    </div>
    {tab==='check'&&<>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <span style={{fontSize:13,color:'var(--tx2)',fontWeight:600}}>{done}/{checks.length}</span>
        <div className="prog-track" style={{flex:1}}>
          <div className="prog-fill" style={{width:`${(done/checks.length)*100}%`,background:`linear-gradient(90deg,var(--grn2),var(--grn))`}}/>
        </div>
        <span className="badge b-grn">{Math.round((done/checks.length)*100)}%</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {checks.map(c=>(
          <button key={c.id} className={`chk-item${c.done?' done':''}`} onClick={()=>setChecks(x=>x.map(i=>i.id===c.id?{...i,done:!i.done}:i))}>
            <div className="chk-box">{c.done&&<span style={{fontSize:12,color:'#fff',fontWeight:900}}>✓</span>}</div>
            <span style={{fontSize:13,color:c.done?'var(--grn)':'var(--tx1)',textDecoration:c.done?'line-through':'none',lineHeight:1.5,textAlign:'left'}}>{c.t}</span>
          </button>
        ))}
      </div>
    </>}
    {tab==='chat'&&<div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 260px)'}}>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,paddingBottom:10}}>
        {msgs.map((m,i)=>(
          <div key={i} className={`msg${m.role==='user'?' usr':' ai'}`}
            style={{alignSelf:m.role==='user'?'flex-end':'flex-start'}}>{m.t}</div>
        ))}
        {typing&&<div className="msg ai" style={{alignSelf:'flex-start',display:'flex',gap:4,padding:'12px 14px'}}>
          {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--blu2)',animation:`wave 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
        </div>}
      </div>
      <div style={{display:'flex',gap:8,paddingTop:8,borderTop:'1px solid var(--bd0)'}}>
        <input className="inp" value={inp} onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
          placeholder="Ask anything... 'file police report?' 'insurance steps?'" style={{flex:1}}/>
        <button onClick={send} disabled={!inp.trim()} style={{padding:'0 16px',background:'var(--blu)',border:'none',borderRadius:11,color:'#fff',cursor:'pointer',fontSize:18,opacity:inp.trim()?1:.5}}>↑</button>
      </div>
      <div style={{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>
        {['Police report?','Insurance claim?','Car towed?','Medical help?'].map(q=>(
          <button key={q} className="chip" style={{fontSize:10}} onClick={()=>setInp(q)}>{q}</button>
        ))}
      </div>
    </div>}
    {tab==='hosp'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {HOSPITALS.map((h,i)=>(
        <div key={i} className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div style={{fontSize:14,fontWeight:700}}>{h.name}</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}>
              <span className="badge b-grn">✅ OPEN</span>
              {h.trauma&&<span className="badge b-red">🚑 Trauma</span>}
            </div>
          </div>
          <div style={{fontSize:11,color:'var(--tx2)',marginBottom:10}}>📍 {h.addr} · {h.dist} · ~{h.eta}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <a href={navUrl(h.lat,h.lng)} target="_blank" style={{padding:'9px',background:'var(--bludark)',border:'1px solid var(--bd2)',borderRadius:9,color:'var(--blu2)',textAlign:'center',fontSize:12,fontWeight:700,textDecoration:'none',fontFamily:'var(--font)'}}>📍 Navigate</a>
            <a href={`tel:${h.phone}`} style={{padding:'9px',background:'var(--bg1)',border:'1px solid var(--bd0)',borderRadius:9,color:'var(--tx1)',textAlign:'center',fontSize:12,fontWeight:700,textDecoration:'none',fontFamily:'var(--font)'}}>📞 Call</a>
          </div>
        </div>
      ))}
    </div>}
    {tab==='pol'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
      <div className="card-sm" style={{background:'var(--bludark)',borderColor:'var(--bd2)',marginBottom:4}}>
        <p style={{fontSize:12,color:'#93c5fd',lineHeight:1.65}}>ℹ️ In Alabama, you must file a police report if: damage exceeds $250, anyone is injured, or a driver is uninsured. Call MPD non-emergency: (334) 241-2651</p>
      </div>
      {POLICE.map((p,i)=>(
        <div key={i} className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div style={{fontSize:14,fontWeight:700}}>{p.name}</div>
            <span className="badge b-blu">✅ Active</span>
          </div>
          <div style={{fontSize:11,color:'var(--tx2)',marginBottom:10}}>📍 {p.addr} · {p.dist} · ~{p.eta}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <a href={navUrl(p.lat,p.lng)} target="_blank" style={{padding:'9px',background:'var(--bludark)',border:'1px solid var(--bd2)',borderRadius:9,color:'var(--blu2)',textAlign:'center',fontSize:12,fontWeight:700,textDecoration:'none',fontFamily:'var(--font)'}}>📍 Navigate</a>
            <a href={`tel:${p.phone}`} style={{padding:'9px',background:'var(--bg1)',border:'1px solid var(--bd0)',borderRadius:9,color:'var(--tx1)',textAlign:'center',fontSize:12,fontWeight:700,textDecoration:'none',fontFamily:'var(--font)'}}>📞 Call</a>
          </div>
        </div>
      ))}
    </div>}
  </div>);
}

/* ═══════════════════ NAV BAR ═══════════════════ */
function NavBar({page,setPage}){
  const items=[
    {id:'map',icon:'🗺️',label:'MAP'},
    {id:'route',icon:'🛡️',label:'ROUTE'},
    {id:'sos',icon:'🆘',label:'SOS'},
    {id:'health',icon:'❤️',label:'HEALTH',dot:true},
    {id:'dashboard',icon:'📊',label:'CITY'},
    {id:'postaccident',icon:'🏥',label:'HELP'},
  ];
  return(<nav className="nav">
    {items.map(it=>(
      <button key={it.id} className={`nav-btn${page===it.id?' on':''}`} onClick={()=>setPage(it.id)}>
        {it.dot&&<span className="n-dot"/>}
        <span className="ni">{it.icon}</span>
        <span className="nl">{it.label}</span>
      </button>
    ))}
  </nav>);
}

/* ═══════════════════ SPLASH SCREEN ═══════════════════ */
function SplashScreen({onDone}){
  useEffect(()=>{setTimeout(onDone,2800)},[]);
  return(
    <div style={{height:'100dvh',background:'var(--bg0)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:0}}>
      {/* Animated logo */}
      <div style={{position:'relative',marginBottom:20}}>
        <div style={{position:'absolute',inset:-20,borderRadius:'50%',border:'1px solid rgba(59,139,255,.3)',animation:'ripple 2s ease-out infinite'}}/>
        <div style={{position:'absolute',inset:-36,borderRadius:'50%',border:'1px solid rgba(34,212,122,.2)',animation:'ripple 2s ease-out .4s infinite'}}/>
        <img src={LOGO_SVG} style={{width:80,height:80,animation:'float 2s ease-in-out infinite'}} alt="SafeStreet AI"/>
      </div>
      <div style={{fontFamily:'var(--display)',fontSize:28,fontWeight:900,color:'var(--tx0)',letterSpacing:'-.5px',marginBottom:6}}>SafeStreet AI</div>
      <div style={{fontSize:13,color:'var(--tx2)',marginBottom:32}}>Montgomery, AL · Powered by Claude AI</div>
      {/* Loading bar */}
      <div style={{width:200,height:3,background:'var(--bg2)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',background:'linear-gradient(90deg,var(--blu),var(--grn))',borderRadius:2,animation:'loadBar 2.4s ease-out forwards'}}/>
      </div>
      <style>{`@keyframes loadBar{from{width:0}to{width:100%}}`}</style>
      <div style={{marginTop:60,display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
        <div style={{fontSize:9,color:'var(--tx3)',letterSpacing:'1px',textTransform:'uppercase'}}>Built By</div>
        <img src={TEAM_LOGO} style={{width:100,height:'auto',opacity:.85,borderRadius:8}} alt="DeepBuild Warriors"/>
        <div style={{fontSize:9,color:'var(--tx3)'}}>WWV Hackathon 2026</div>
      </div>
    </div>
  );
}

/* ═══════════════════ APP ROOT ═══════════════════ */
function App(){
  const[page,setPage]=useState('map');
  const[splash,setSplash]=useState(true);

  if(splash)return<SplashScreen onDone={()=>setSplash(false)}/>;

  const screens={
    map:<MapHome setPage={setPage}/>,
    route:<RouteCheck/>,
    sos:<SOSScreen/>,
    health:<HealthMonitor setPage={setPage}/>,
    responder:<ResponderScreen/>,
    dashboard:<Dashboard/>,
    postaccident:<PostAccident/>,
    nearby:<NearbyScreen setPage={setPage}/>,
  };

  return(<div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
    <div style={{flex:1,overflow:'hidden',position:'relative'}}>
      {page==='map'
        ?<div className="map-page">{screens.map}</div>
        :<div className="page">{screens[page]||screens.map}</div>
      }
    </div>
    <NavBar page={page} setPage={setPage}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
