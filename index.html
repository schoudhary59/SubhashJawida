<style>
/* ══════════════════════════════════════════════════════
   SAFESTREET AI v5 — DESIGN SYSTEM
══════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* Backgrounds */
  --bg0:#040d1a;--bg1:#061020;--bg2:#091628;--bg3:#0d1e35;--bg4:#122540;--bg5:#182e4e;
  /* Borders */
  --bd0:#162238;--bd1:#1d2f4a;--bd2:#243c5e;--bd3:#2d4d76;
  /* Text */
  --tx0:#f0f7ff;--tx1:#8ab4d4;--tx2:#4a6d8a;--tx3:#253d52;
  /* Brand colors */
  --red:#e8404a;--red2:#ff6169;--redsoft:rgba(232,64,74,.15);--redglow:rgba(232,64,74,.35);
  --grn:#22d47a;--grn2:#16a85c;--grnsoft:rgba(34,212,122,.12);
  --amb:#f5a520;--amb2:#ffbe47;--ambsoft:rgba(245,165,32,.12);
  --blu:#3d94ff;--blu2:#66b0ff;--blusoft:rgba(61,148,255,.12);--bludark:#070e1f;
  --pur:#9d6ef5;--pursoft:rgba(157,110,245,.12);
  --teal:#15c4b0;--tealsoft:rgba(21,196,176,.1);
  --coral:#ff6b6b;--crl2:#ff8e8e;
  /* Typography */
  --font:'Inter',system-ui,sans-serif;
  --display:'Syne',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  /* Radii */
  --r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:18px;--r-xl:24px;--r-2xl:32px;
  /* Shadows */
  --sh-sm:0 2px 12px rgba(0,0,0,.45);
  --sh-md:0 4px 24px rgba(0,0,0,.55);
  --sh-lg:0 8px 40px rgba(0,0,0,.65);
  --sh-blu:0 4px 20px rgba(61,148,255,.25);
  --sh-red:0 4px 20px rgba(232,64,74,.3);
  --sh-grn:0 4px 20px rgba(34,212,122,.25);
  /* Transitions */
  --t-fast:120ms ease;--t-med:220ms ease;--t-slow:380ms ease;
}
html,body,#root{height:100%;background:var(--bg0);color:var(--tx0);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}
*::-webkit-scrollbar{width:2px}*::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── LAYOUT ── */
.page{height:calc(100dvh - 64px);overflow-y:auto;overscroll-behavior:contain;position:relative}
.map-page{height:calc(100dvh - 64px);overflow:hidden;position:relative}
.pg{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:24px}
.pg-sm{padding:12px;display:flex;flex-direction:column;gap:12px;padding-bottom:24px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.8}}
@keyframes ripple{to{transform:scale(2.8);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes co2up{0%{transform:translateY(0);opacity:.95}100%{transform:translateY(-44px);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--redglow)}50%{box-shadow:0 0 22px var(--redglow),0 0 40px var(--redglow)}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}

.fade-up{animation:fadeUp .35s ease both}
.fade-up-2{animation:fadeUp .35s .08s ease both}
.fade-up-3{animation:fadeUp .35s .16s ease both}
.scale-in{animation:scaleIn .3s ease both}

/* ── NAVIGATION ── */
.nav{
  display:flex;background:rgba(4,13,26,.97);border-top:1px solid var(--bd0);
  height:64px;padding-bottom:env(safe-area-inset-bottom,0);
  z-index:300;flex-shrink:0;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  position:relative;
}
.nav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(61,148,255,.3),transparent)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:0;cursor:pointer;padding:6px 2px;position:relative;
  transition:opacity var(--t-fast)}
.nb:active{opacity:.7}
.nb .ni{font-size:16px;transition:transform var(--t-med),filter var(--t-med);line-height:1}
.nb .nl{font-size:7.5px;font-weight:700;letter-spacing:.6px;color:var(--tx2);
  transition:color var(--t-med);text-transform:uppercase;font-family:var(--font)}
.nb.on .nl{color:var(--blu2)}
.nb.on .ni{transform:translateY(-2px);filter:drop-shadow(0 0 6px rgba(102,176,255,.8))}
.nb.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:24px;height:2.5px;background:linear-gradient(90deg,var(--blu),var(--teal));
  border-radius:2px;box-shadow:0 0 8px rgba(61,148,255,.6)}
.ndot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;
  border-radius:50%;background:var(--red);animation:blink 1.4s infinite,glow 2s infinite;
  border:1.5px solid var(--bg0)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bd0);border-radius:var(--r-lg);padding:18px;
  transition:border-color var(--t-med)}
.csm{background:var(--bg2);border:1px solid var(--bd0);border-radius:var(--r-md);padding:13px}
.glass{background:rgba(6,16,32,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(22,34,56,.9);border-radius:var(--r-md)}
.glass-bright{background:rgba(9,22,40,.95);backdrop-filter:blur(28px);
  border:1px solid rgba(29,47,74,.9);border-radius:var(--r-md)}
.card-grn{background:linear-gradient(135deg,rgba(34,212,122,.07),rgba(22,168,92,.03));border:1px solid rgba(34,212,122,.2)}
.card-blu{background:linear-gradient(135deg,rgba(61,148,255,.07),rgba(61,148,255,.03));border:1px solid rgba(61,148,255,.2)}
.card-red{background:linear-gradient(135deg,rgba(232,64,74,.1),rgba(232,64,74,.03));border:1px solid rgba(232,64,74,.25)}
.card-amb{background:linear-gradient(135deg,rgba(245,165,32,.08),rgba(245,165,32,.02));border:1px solid rgba(245,165,32,.22)}

/* ── INPUTS ── */
.inp{width:100%;background:var(--bg1);border:1.5px solid var(--bd1);border-radius:var(--r-md);
  padding:13px 16px;color:var(--tx0);font-family:var(--font);font-size:14px;outline:none;
  transition:border var(--t-med),box-shadow var(--t-med),background var(--t-med)}
.inp:focus{border-color:var(--blu);box-shadow:0 0 0 3px rgba(61,148,255,.14);background:var(--bg2)}
.inp::placeholder{color:var(--tx2)}

/* ── BUTTONS ── */
.btn{width:100%;padding:14px 18px;border:none;border-radius:var(--r-md);color:#fff;
  font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);
  transition:all var(--t-fast);display:flex;align-items:center;justify-content:center;
  gap:8px;text-decoration:none;letter-spacing:.2px}
.btn:active{transform:scale(.97);filter:brightness(.9)}
.btn-red{background:linear-gradient(135deg,#b02830,var(--red));box-shadow:var(--sh-red)}
.btn-grn{background:linear-gradient(135deg,var(--grn2),var(--grn));box-shadow:var(--sh-grn)}
.btn-blu{background:linear-gradient(135deg,#1a5fd4,var(--blu));box-shadow:var(--sh-blu)}
.btn-amb{background:linear-gradient(135deg,#a06510,var(--amb))}
.btn-pur{background:linear-gradient(135deg,#6d3fc8,var(--pur))}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--bd1);color:var(--tx1)}
.btn-ghost:hover{background:var(--bg4);border-color:var(--bd2)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:var(--r-sm);width:auto}
.btn-outline{background:transparent;border:1.5px solid var(--bd2);color:var(--tx1)}
.btn-pulse{animation:pulse 1.5s ease infinite}

/* ── BADGES / CHIPS ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bdg-red{background:rgba(232,64,74,.18);color:var(--red2);border:1px solid rgba(232,64,74,.3)}
.bdg-grn{background:rgba(34,212,122,.15);color:var(--grn);border:1px solid rgba(34,212,122,.28)}
.bdg-amb{background:rgba(245,165,32,.15);color:var(--amb2);border:1px solid rgba(245,165,32,.28)}
.bdg-blu{background:rgba(61,148,255,.15);color:var(--blu2);border:1px solid rgba(61,148,255,.28)}
.bdg-pur{background:rgba(157,110,245,.15);color:#c4a7ff;border:1px solid rgba(157,110,245,.28)}
.bdg-teal{background:rgba(21,196,176,.12);color:var(--teal);border:1px solid rgba(21,196,176,.25)}
.chip{display:inline-flex;align-items:center;padding:6px 12px;background:var(--bg3);
  border:1px solid var(--bd1);border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all var(--t-fast);white-space:nowrap;color:var(--tx1)}
.chip:active{background:var(--bg4);transform:scale(.96)}
.chip.active{background:rgba(61,148,255,.15);border-color:var(--blu);color:var(--blu2)}

/* ── PROGRESS ── */
.pbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1)}
.pbar-thin{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pfill-thin{height:100%;border-radius:2px;transition:width 1s ease}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--bg1);border-radius:var(--r-md);padding:4px;margin-bottom:14px;
  border:1px solid var(--bd0)}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;border-radius:10px;
  cursor:pointer;transition:all var(--t-med);color:var(--tx2);border:none;background:0;font-family:var(--font)}
.tab.on{background:var(--bg4);color:var(--tx0);box-shadow:var(--sh-sm)}

/* ── MISC ── */
.spinning{animation:spin .7s linear infinite;display:inline-block}
.divider{height:1px;background:var(--bd0);margin:4px 0}
.section-hd{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}

/* ── CO2 WIDGET ── */
.co2w{position:fixed;bottom:72px;right:12px;z-index:250;
  background:rgba(4,13,26,.96);border:1px solid rgba(34,212,122,.38);
  border-radius:18px;padding:9px 13px;backdrop-filter:blur(20px);
  min-width:120px;cursor:pointer;overflow:visible;
  box-shadow:0 4px 20px rgba(34,212,122,.15);transition:all var(--t-med)}
.co2w:active{transform:scale(.96)}
.co2p{position:absolute;font-size:9.5px;font-weight:700;pointer-events:none;
  animation:co2up 2.2s ease-out forwards;color:#4ade80;font-family:var(--mono)}

/* ── TRAFFIC BANNER ── */
.tbanner{background:linear-gradient(135deg,rgba(245,165,32,.1),rgba(245,165,32,.03));
  border:1px solid rgba(245,165,32,.28);border-radius:var(--r-md);padding:13px 15px}

/* ── SCORE CARD ── */
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0}

/* ── HAZARD PULSE ── */
@keyframes hazardPulse{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.3);opacity:.5}
  100%{transform:scale(1.8);opacity:0}
}
.hazard-pulse::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:inherit;animation:hazardPulse 2s ease-out infinite;opacity:.5
}

/* ── ONBOARDING ── */
.onboard-slide{animation:fadeIn .4s ease}

/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-md);
  background:var(--bg3);border:1px solid var(--bd0);transition:all var(--t-fast)}
.lb-row.me{background:var(--blusoft);border-color:rgba(61,148,255,.3)}

/* ── VOICE ALERT ── */
.voice-alert{position:fixed;top:70px;left:12px;right:12px;z-index:500;
  background:linear-gradient(135deg,rgba(232,64,74,.18),rgba(232,64,74,.08));
  border:1.5px solid var(--red);border-radius:var(--r-lg);padding:12px 16px;
  backdrop-filter:blur(20px);animation:slideUp .35s ease;
  box-shadow:0 4px 24px var(--redglow)}
</style>

function genHeat(){
  const pts=[];
  CORRIDORS.forEach(c=>{for(let i=0;i<c.crashes*5;i++)pts.push([c.lat+(Math.random()-.5)*.018,c.lng+(Math.random()-.5)*.018,Math.random()*.6+.4]);});
  return pts;
}
const HEAT_PTS=genHeat();

/* ══ HELPERS ══ */
const riskColor=s=>s>=75?'var(--red)':s>=50?'var(--amb)':s>=30?'#f97316':'var(--grn)';
const riskLevel=s=>s>=75?'CRITICAL':s>=50?'HIGH':s>=30?'MODERATE':'LOW';
const riskBadge=s=>s>=75?'bdg-red':s>=50?'bdg-amb':s>=30?'bdg-amb':'bdg-grn';
const navUrl=(lat,lng)=>`https://www.google.com/maps/dir/Current+Location/${lat},${lng}`;
const calcCO2=(miles,type='sedan')=>{const g=miles*(CO2_FACTORS[type]||251);return{grams:Math.round(g),kg:(g/1000).toFixed(2),trees:Math.ceil(g/21000)};};
const tBadge=l=>l==='heavy'?{cls:'bdg-red',txt:'Heavy'}:l==='moderate'?{cls:'bdg-amb',txt:'Moderate'}:{cls:'bdg-grn',txt:'Light'};

async function askClaude(prompt,sys='You are SafeStreet AI for Montgomery AL. Be concise and practical.',max=900){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,system:sys,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();return d.content?.[0]?.text||null;
  }catch{return null;}
}

/* ══ VOICE ALERTS ══ */
let _voiceEnabled=true;
function speak(text){
  if(!_voiceEnabled||!window.speechSynthesis)return;
  try{const u=new SpeechSynthesisUtterance(text);u.rate=.95;u.pitch=1;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}
}

/* ══ SHARED: RISK DIAL SVG ══ */
function RiskDial({score,size=130}){
  const r=52;const circ=2*Math.PI*r;const col=riskColor(score);
  return(
    <svg width={size} height={size} viewBox="0 0 120 120" style={{display:'block'}}>
      <circle cx="60" cy="60" r={r} fill="none" stroke="var(--bg4)" strokeWidth="9"/>
      <circle cx="60" cy="60" r={r} fill="none" stroke={col} strokeWidth="9" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={circ-(score/100)*circ}
        style={{transformOrigin:'center',transform:'rotate(-90deg)',transition:'stroke-dashoffset 1.4s cubic-bezier(.34,1.2,.64,1)'}}/>
      <circle cx="60" cy="60" r="40" fill="var(--bg2)"/>
      <text x="60" y="57" textAnchor="middle" fill="white" fontSize="24" fontWeight="900" fontFamily="DM Mono,monospace">{score}</text>
      <text x="60" y="73" textAnchor="middle" fill={col} fontSize="9.5" fontWeight="700" fontFamily="Inter,sans-serif">{riskLevel(score)}</text>
    </svg>
  );
}

/* ══ SHARED: SOS BUTTON ══ */
function SOSBtn({onTrigger}){
  const [hold,setHold]=useState(false);const [cnt,setCnt]=useState(3);const t=useRef(null);
  const start=e=>{e.preventDefault();setHold(true);setCnt(3);
    t.current=setInterval(()=>setCnt(c=>{if(c<=1){clearInterval(t.current);setHold(false);onTrigger();return 3;}return c-1;}),1000);};
  const stop=()=>{if(t.current)clearInterval(t.current);setHold(false);setCnt(3);};
  return(
    <button onMouseDown={start} onTouchStart={start} onMouseUp={stop} onTouchEnd={stop} onMouseLeave={stop}
      style={{position:'fixed',top:14,right:14,zIndex:400,width:52,height:52,borderRadius:'50%',
        background:hold?'rgba(232,64,74,.35)':'rgba(232,64,74,.18)',
        border:`2px solid ${hold?'var(--red2)':'var(--red)'}`,color:hold?'var(--red2)':'var(--red)',
        fontSize:hold?15:19,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',
        justifyContent:'center',transition:'all .15s',fontFamily:'var(--font)',
        boxShadow:hold?'0 0 24px var(--redglow),0 0 48px var(--redglow)':'0 0 10px var(--redglow)'}}>
      {hold?cnt:'🆘'}
    </button>
  );
}

/* ══ SHARED: CO2 WIDGET ══ */
function CO2Widget({miles,vType,onOpen}){
  const [pts,setPts]=useState([]);
  const co2=calcCO2(miles,vType);
  useEffect(()=>{const id=setInterval(()=>setPts(p=>[...p.slice(-3),{id:Date.now(),x:Math.random()*65+12}]),2800);return()=>clearInterval(id);},[]);
  if(miles<0.04)return null;
  return(
    <div className="co2w" onClick={onOpen}>
      {pts.map(p=><span key={p.id} className="co2p" style={{left:`${p.x}%`,bottom:'100%'}}>CO₂</span>)}
      <div style={{fontSize:9,color:'var(--tx2)',fontWeight:700,marginBottom:1,letterSpacing:.5}}>🌿 LIVE EMISSIONS</div>
      <div style={{fontSize:21,fontWeight:900,fontFamily:'var(--mono)',color:'#4ade80',lineHeight:1.1}}>
        {co2.grams}<span style={{fontSize:10,fontWeight:400,color:'var(--tx1)'}}> g</span>
      </div>
      <div style={{fontSize:9,color:'var(--tx2)'}}>{miles.toFixed(1)} mi · tap</div>
    </div>
  );
}

function TrafficScreen({setPage,voiceAlert,setVoiceAlert}){
  const [origin,setOrigin]=useState('');const [dest,setDest]=useState('');
  const [vType,setVType]=useState('sedan');const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);const [showAware,setShowAware]=useState(false);
  const [activeTab,setActiveTab]=useState('analysis');

  const VTYPES=[
    {id:'sedan',label:'🚗 Sedan',g:251},{id:'suv',label:'🚙 SUV',g:354},
    {id:'truck',label:'🛻 Truck',g:414},{id:'hybrid',label:'⚡ Hybrid',g:133},
    {id:'electric',label:'🔋 EV',g:0},{id:'motorcycle',label:'🏍️ Moto',g:107},
  ];

  async function analyze(){
    if(!origin||!dest)return;
    setLoading(true);setResult(null);setShowAware(false);
    const dist=(Math.random()*8+2).toFixed(1);
    const co2data=calcCO2(parseFloat(dist),vType);
    const heavy=TRAFFIC_ZONES.filter(t=>t.level==='heavy').map(t=>t.name).join(', ');
    const mod=TRAFFIC_ZONES.filter(t=>t.level==='moderate').map(t=>t.name).join(', ');
    const baseDelay=Math.floor(Math.random()*14+8);
    const altDelay=Math.max(2,baseDelay-Math.floor(Math.random()*8+4));
    const raw=await askClaude(
      `Route "${origin}" to "${dest}" Montgomery AL ~${dist}mi. HEAVY: ${heavy}. MODERATE: ${mod}. Vehicle: ${vType}, CO2: ${co2data.grams}g. Return ONLY valid JSON: {"score":number,"level":"LOW|MODERATE|HIGH|CRITICAL","exp":"string","risks":["r1","r2","r3"],"rec":"string","alt":"string","trafficDelay":${baseDelay},"altDelay":${altDelay},"co2msg":"string"}`,
      'You are a traffic + route risk AI for Montgomery AL. Reply ONLY with valid compact JSON. Zero prose.'
    );
    let r;
    try{r=JSON.parse((raw||'').replace(/```json|```/g,'').trim());}
    catch{
      const isHeavy=TRAFFIC_ZONES.some(t=>t.level==='heavy');
      r={score:isHeavy?73:44,level:isHeavy?'HIGH':'MODERATE',
        exp:`Route from ${origin} to ${dest} passes through congested corridors.`,
        risks:isHeavy?['Heavy congestion on Atlanta Hwy (+18 min)','Active crash site at Eastern Blvd','Rain reducing I-85 visibility']:['Moderate I-85 congestion','School zone on Bell St','Minor construction on Troy Hwy'],
        rec:`Use Ann Street → ML King Jr Blvd to save ~${baseDelay-altDelay} minutes.`,
        alt:'Ann St → ML King Jr Blvd',trafficDelay:baseDelay,altDelay:altDelay,
        co2msg:`${co2data.grams}g CO₂ this trip. ${vType==='electric'?'Zero direct emissions!':vType==='hybrid'?'Hybrid saves ~47% vs sedan.':'Carpooling cuts footprint in half.'}`};
    }
    r.dist=dist;r.co2=co2data;r.vType=vType;
    setResult(r);setLoading(false);
    // Voice alert if high risk
    if(r.score>=50)setVoiceAlert(`${r.level} risk route detected. ${r.rec}`);
    setTimeout(()=>setShowAware(true),1600);
  }

  return(
    <div className="page fade-up">
      <div className="pg">
        {/* Header */}
        <div style={{textAlign:'center',paddingBottom:4}}>
          <img src={IMG_MAIN} style={{height:30,objectFit:'contain',marginBottom:8}} alt="SafeStreet AI"/>
          <div style={{fontFamily:'var(--display)',fontSize:19,fontWeight:900}}>🚦 Traffic + CO₂ Engine</div>
          <div style={{fontSize:11,color:'var(--tx2)',marginTop:3}}>Smart detours · live congestion · emissions tracking</div>
        </div>

        {/* Live traffic grid */}
        <div className="card-amb">
          <div className="section-hd">🚦 LIVE TRAFFIC — MONTGOMERY</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {TRAFFIC_ZONES.map((tz,i)=>{
              const tb=tBadge(tz.level);
              return(
                <div key={i} style={{background:'var(--bg3)',borderRadius:var_r_md,padding:'8px 10px',border:'1px solid var(--bd0)'}}>
                  <div style={{fontSize:10,color:'var(--tx1)',marginBottom:4,fontWeight:600}}>{tz.name}</div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span className={`badge ${tb.cls}`} style={{fontSize:10}}>{tb.txt}</span>
                    {tz.level!=='light'&&<span style={{fontSize:11,fontWeight:700,fontFamily:'var(--mono)',color:tz.color}}>+{tz.delay}m</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Vehicle selector */}
        <div>
          <div className="section-hd">YOUR VEHICLE</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {VTYPES.map(v=>(
              <button key={v.id} onClick={()=>setVType(v.id)}
                className={`chip ${vType===v.id?'active':''}`}
                style={{flexDirection:'column',gap:1,padding:'7px 11px',fontSize:10.5}}>
                <span>{v.label}</span>
                <span style={{fontSize:8.5,color:vType===v.id?'var(--blu2)':'var(--tx3)'}}>{v.g}g/mi</span>
              </button>
            ))}
          </div>
        </div>

        {/* Route inputs */}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <input className="inp" placeholder="📍 From — e.g. Downtown Montgomery" value={origin} onChange={e=>setOrigin(e.target.value)}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {['Downtown','Maxwell AFB','Eastdale Mall'].map(o=><span key={o} className="chip" style={{fontSize:11}} onClick={()=>setOrigin(o)}>{o}</span>)}
          </div>
          <input className="inp" placeholder="🏁 To — e.g. Baptist Health" value={dest} onChange={e=>setDest(e.target.value)}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {['Baptist Health','Jackson Hospital','Airport','Troy University'].map(d=><span key={d} className="chip" style={{fontSize:11}} onClick={()=>setDest(d)}>{d}</span>)}
          </div>
        </div>

        <button className="btn btn-blu" onClick={analyze} disabled={loading||!origin||!dest}
          style={{opacity:(!origin||!dest)?0.5:1}}>
          {loading?<span className="spinning">⟳</span>:'🧠'} {loading?'Analyzing traffic + emissions…':'Analyze Route + Traffic + CO₂'}
        </button>

        {result&&(
          <div style={{display:'flex',flexDirection:'column',gap:14,animation:'fadeUp .4s ease'}}>
            {/* Tabs */}
            <div className="tabs">
              {[['analysis','📊 Analysis'],['compare','🔀 Routes'],['co2','🌿 CO₂']].map(([k,l])=>(
                <button key={k} className={`tab ${activeTab===k?'on':''}`} onClick={()=>setActiveTab(k)}>{l}</button>
              ))}
            </div>

            {activeTab==='analysis'&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {/* Risk + delay */}
                <div style={{display:'flex',gap:12,alignItems:'stretch'}}>
                  <div className="card" style={{textAlign:'center',flex:'0 0 auto',padding:'14px'}}>
                    <RiskDial score={result.score} size={118}/>
                  </div>
                  <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                    <div className="card" style={{flex:1,textAlign:'center',padding:'10px',border:'1px solid rgba(239,68,68,.3)'}}>
                      <div style={{fontSize:9,color:'var(--tx2)',marginBottom:2}}>Current Route</div>
                      <div style={{fontSize:26,fontWeight:900,fontFamily:'var(--mono)',color:'var(--red2)'}}>+{result.trafficDelay}<span style={{fontSize:11}}>m</span></div>
                    </div>
                    <div className="card" style={{flex:1,textAlign:'center',padding:'10px',border:'1px solid rgba(34,212,122,.3)'}}>
                      <div style={{fontSize:9,color:'var(--tx2)',marginBottom:2}}>Smart Detour</div>
                      <div style={{fontSize:26,fontWeight:900,fontFamily:'var(--mono)',color:'var(--grn)'}}>+{result.altDelay}<span style={{fontSize:11}}>m</span></div>
                    </div>
                  </div>
                </div>
                <div style={{fontSize:12,color:'var(--tx1)',textAlign:'center'}}>{result.exp}</div>
                {/* Risks */}
                <div className="card">
                  <div className="section-hd">⚠️ RISK FACTORS</div>
                  {result.risks.map((r,i)=>(
                    <div key={i} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:i<result.risks.length-1?'1px solid var(--bd0)':'none'}}>
                      <span style={{color:riskColor(result.score),fontSize:13}}>•</span>
                      <span style={{fontSize:12,color:'var(--tx1)',lineHeight:1.4}}>{r}</span>
                    </div>
                  ))}
                </div>
                {/* Recommendation */}
                <div className="card card-blu">
                  <div className="section-hd">💡 AI RECOMMENDATION</div>
                  <div style={{fontSize:13,color:'var(--tx0)',lineHeight:1.6,marginBottom:8}}>{result.rec}</div>
                  <div style={{background:'rgba(34,212,122,.08)',border:'1px solid rgba(34,212,122,.2)',borderRadius:10,padding:'9px 11px'}}>
                    <span style={{fontSize:11,color:'var(--grn)',fontWeight:700}}>✅ Via: </span>
                    <span style={{fontSize:11,color:'var(--tx0)'}}>{result.alt}</span>
                    <span style={{fontSize:10,color:'var(--tx2)',marginLeft:6}}>· saves ~{result.trafficDelay-result.altDelay} min</span>
                  </div>
                </div>
              </div>
            )}

            {activeTab==='compare'&&<SafeRouteComparison origin={origin} dest={dest}/>}

            {activeTab==='co2'&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="card card-grn">
                  <div className="section-hd">🌿 CO₂ THIS TRIP — {result.dist} miles</div>
                  <div style={{display:'flex',gap:10,marginBottom:12}}>
                    {[[result.co2.grams+'g','This trip','#4ade80'],[result.co2.kg+'kg','kg carbon','#86efac'],[result.co2.trees+'🌳','Trees to offset','#bbf7d0']].map(([v,l,c])=>(
                      <div key={l} style={{flex:1,textAlign:'center',background:'rgba(34,212,122,.06)',borderRadius:10,padding:'10px 4px'}}>
                        <div style={{fontSize:22,fontWeight:900,fontFamily:'var(--mono)',color:c}}>{v}</div>
                        <div style={{fontSize:9,color:'var(--tx2)',marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:'rgba(34,212,122,.08)',borderRadius:8,padding:'9px 11px',fontSize:12,color:'#86efac',lineHeight:1.5}}>🌱 {result.co2msg}</div>
                </div>
                {showAware&&result.co2.grams>0&&(
                  <div className="card card-grn" style={{animation:'fadeUp .5s ease'}}>
                    <div className="section-hd">🌍 ENVIRONMENTAL AWARENESS</div>
                    <div style={{fontSize:12,color:'var(--tx1)',lineHeight:1.8}}>
                      At this rate:<br/>
                      📅 <b>Monthly:</b> ~{Math.round(result.co2.grams*22/1000)} kg CO₂<br/>
                      📆 <b>Yearly:</b> ~{Math.round(result.co2.grams*260/1000)} kg CO₂<br/>
                      🌳 <b>Offset:</b> {Math.ceil(result.co2.grams*260/21000)} trees/year
                      {vType!=='electric'&&<span><br/>⚡ <b>Switch to EV</b> → save {Math.round(result.co2.grams*260/1000)} kg CO₂/year!</span>}
                    </div>
                    {vType!=='electric'&&(
                      <div style={{display:'flex',gap:8,marginTop:10}}>
                        <button className="btn btn-grn btn-sm" onClick={()=>setVType('electric')} style={{flex:1}}>Try EV Mode 🔋</button>
                        <button className="btn btn-ghost btn-sm" style={{flex:1}}>Share 🌍</button>
                      </div>
                    )}
                  </div>
                )}
                {/* CO2 by vehicle comparison */}
                <div className="card">
                  <div className="section-hd">🚗 CO₂ BY VEHICLE — same {result.dist} mi route</div>
                  {[['sedan','🚗 Sedan',251],['hybrid','⚡ Hybrid',133],['electric','🔋 Electric',0]].map(([k,lbl,g])=>{
                    const grams=Math.round(parseFloat(result.dist)*g);
                    return(
                      <div key={k} style={{marginBottom:8}}>

                        </div>

                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );

/* ══════════════════════════════════════════
   ROUTE SAFETY CHECK
══════════════════════════════════════════ */
function RouteCheck({setPage,setVoiceAlert}){
  const [o,setO]=useState('');const [d,setD]=useState('');
  const [loading,setLoading]=useState(false);const [res,setRes]=useState(null);const [live,setLive]=useState(false);
  const MOCKS=[
    {score:74,level:'HIGH',exp:'High accident corridor with rain advisory and reduced visibility.',risks:['High crash hotspot on Atlanta Hwy','Rain advisory active','Low night visibility'],rec:'Take Eastern Blvd to avoid Atlanta Hwy hotspot.',alt:'Eastern Blvd via Troy Hwy'},
    {score:42,level:'MODERATE',exp:'Moderate traffic with school zone enforcement in effect.',risks:['School zone active on Bell St','Moderate I-85 congestion','Construction on Troy Hwy'],rec:'Leave before 7:30am to avoid school zone delays.',alt:'Carmichael Rd via Vaughn Rd'},
    {score:18,level:'LOW',exp:'Clear conditions with minimal hazards on this route.',risks:['Light weekend traffic','Minor road work','School zone inactive'],rec:'Route looks safe. Normal caution advised.',alt:'Current route is optimal'},
  ];
  async function check(){
    if(!o||!d)return;setLoading(true);setRes(null);setLive(false);
    const raw=await askClaude(`Route from "${o}" to "${d}" Montgomery AL. Top hotspot: ${CORRIDORS[0].name}. Active hazards: ${HAZARDS.map(h=>h.desc).join('; ')}. Reply ONLY JSON: {"score":number,"level":"LOW|MODERATE|HIGH|CRITICAL","exp":"string","risks":["r1","r2","r3"],"rec":"string","alt":"string"}`,'You are a route risk AI. Reply ONLY with valid compact JSON.');
    try{const r=JSON.parse((raw||'').replace(/```json|```/g,'').trim());setRes(r);setLive(true);}
    catch{setRes(MOCKS[Math.floor(Math.random()*MOCKS.length)]);}
    setLoading(false);
  }
  useEffect(()=>{if(res&&res.score>=50)setVoiceAlert(`${res.level} risk detected on route. ${res.rec}`);},[res]);

  return(
    <div className="page fade-up">
      <div className="pg">
        <div style={{textAlign:'center',paddingBottom:4}}>
          <img src={IMG_MAIN} style={{height:30,objectFit:'contain',marginBottom:8}} alt="SafeStreet AI"/>
          <div style={{fontFamily:'var(--display)',fontSize:19,fontWeight:900}}>🧭 Route Safety Check</div>
          <div style={{fontSize:11,color:'var(--tx2)',marginTop:3}}>AI-powered risk analysis with real crash data</div>
        </div>

        {/* Primary CTA card */}
        {!res&&!loading&&(
          <div className="card card-blu" style={{textAlign:'center',padding:'16px'}}>
            <div style={{fontSize:28,marginBottom:8}}>🛡️</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Start Safe Route Analysis</div>
            <div style={{fontSize:12,color:'var(--tx2)'}}>Enter your origin and destination below to get an AI-powered safety score</div>
          </div>
        )}

        <input className="inp" placeholder="📍 Origin" value={o} onChange={e=>setO(e.target.value)}/>
        <input className="inp" placeholder="🏁 Destination" value={d} onChange={e=>setD(e.target.value)}/>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {['Downtown → Baptist Health','Airport → Jackson Hospital','Maxwell → Troy Univ'].map(q=>(
            <span key={q} className="chip" style={{fontSize:10.5}} onClick={()=>{const[a,b]=q.split(' → ');setO(a);setD(b);}}>{q}</span>
          ))}
        </div>
        <button className="btn btn-blu" onClick={check} disabled={loading||!o||!d} style={{opacity:!o||!d?0.5:1}}>
          {loading?<span className="spinning">⟳</span>:'🧠'} {loading?'Analyzing route…':'Analyze Route Safety'}

/* ══════════════════════════════════════════
   HEALTH MONITOR
══════════════════════════════════════════ */
function HealthMonitor({setVoiceAlert}){
  const [bpm,setBpm]=useState(72);const [hist,setHist]=useState(Array(24).fill(72));
  const [phase,setPhase]=useState(0);const [alert,setAlert]=useState(false);
  const [monitoring,setMonitoring]=useState(false);const timer=useRef(null);
  const SEQ=[[72,74,70,73,71,72,74,70,73,72,71,73],[98,102,108,94,112,106,98,110,104,98,108,102],[144,152,148,156,160,149,158,162,155,0]];

  function startMon(){
    setMonitoring(true);setPhase(0);setAlert(false);let si=0;let pi=0;
    timer.current=setInterval(()=>{const v=SEQ[pi][si];if(v===0){clearInterval(timer.current);setAlert(true);setVoiceAlert('Cardiac alert detected! Triggering emergency protocol immediately.');return;}
      setBpm(v);setHist(h=>[...h.slice(1),v]);si++;
      if(si>=SEQ[pi].length){si=0;pi=Math.min(pi+1,SEQ.length-1);setPhase(pi);}},560);}
  function stopMon(){clearInterval(timer.current);setMonitoring(false);setBpm(72);setPhase(0);setAlert(false);}
  useEffect(()=>()=>clearInterval(timer.current),[]);

  const bColor=bpm>140||bpm<50?'var(--red2)':bpm>100?'var(--amb2)':'var(--grn)';
  const status=bpm<50?'BRADYCARDIA':bpm>140?'CARDIAC ALERT':bpm>100?'ELEVATED':'NORMAL';

  if(alert)return(
    <div className="page fade-up" style={{padding:16,background:'radial-gradient(ellipse at top,rgba(232,64,74,.18) 0%,var(--bg0) 55%)',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{textAlign:'center',padding:'18px 0'}}>
        <div style={{fontSize:50,animation:'glow 1s infinite,pulse .6s infinite'}}>❤️‍🔥</div>
        <div style={{fontFamily:'var(--display)',fontSize:24,fontWeight:900,color:'var(--red2)',marginTop:10}}>CARDIAC ALERT</div>
        <div style={{fontSize:13,color:'var(--tx2)',marginTop:4}}>Abnormal heart rhythm detected — emergency triggered</div>
      </div>
      <div className="card card-red">
        {[['🚨','911 Auto-Call','Initiated','grn'],['📱','Family SMS','3 contacts sent','grn'],['🏥','Hospital Alert','Jackson Hospital notified','grn'],['👮','Police','En route · ETA 4 min','amb']].map(([ic,a,b,c])=>(
          <div key={a} style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(232,64,74,.1)'}}>
            <span style={{fontSize:16,width:22}}>{ic}</span>
            <span style={{fontSize:12,flex:1,color:'var(--tx1)'}}>{a}</span>
            <span className={`badge bdg-${c}`}>{b}</span>
          </div>
        ))}
      </div>
      <button className="btn btn-red" onClick={stopMon}>Reset Monitor</button>
    </div>
  );

  return(
    <div className="page fade-up pg">
      <div style={{fontFamily:'var(--display)',fontSize:19,fontWeight:900}}>❤️ Driver Health Monitor</div>

      {/* BPM Display */}
      <div className="card" style={{textAlign:'center',padding:'24px 18px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,background:`radial-gradient(circle at center,${bColor}08,transparent 70%)`,pointerEvents:'none'}}/>
        <div style={{fontSize:72,fontWeight:900,fontFamily:'var(--mono)',color:bColor,lineHeight:1,
          transition:'color .5s',animation:monitoring&&bpm>0?`pulse ${(60/Math.max(bpm,1)).toFixed(2)}s ease infinite`:'none'}}>
          {bpm}
        </div>
        <div style={{fontSize:14,color:'var(--tx2)',marginTop:4,fontWeight:600}}>BPM</div>
        <span className={`badge bdg-${bpm>120||bpm<50?'red':bpm>90?'amb':'grn'}`} style={{marginTop:10,display:'inline-flex',fontSize:12}}>
          {status}
        </span>
      </div>

      {/* ECG Chart */}
      <div className="card">
        <div className="section-hd">ECG LIVE TRACE</div>
        <div style={{display:'flex',gap:2,alignItems:'flex-end',height:56}}>
          {hist.map((v,i)=>{
            const h=Math.max(3,((v-45)/160)*52+3);
            const isLatest=i===hist.length-1;
            return(
              <div key={i} style={{flex:1,height:`${h}px`,background:isLatest?bColor:'var(--bd2)',borderRadius:'2px 2px 0 0',transition:'height .35s ease,background .5s'}}/>
            );
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
          <span style={{fontSize:9,color:'var(--tx3)'}}>←24s</span>
          <span style={{fontSize:9,color:'var(--tx3)'}}>LIVE</span>
        </div>
      </div>

      {/* Phase card */}
      {monitoring&&(
        <div className="card" style={{border:`1.5px solid ${phase===0?'rgba(34,212,122,.35)':phase===1?'rgba(245,165,32,.35)':'rgba(232,64,74,.35)'}`,animation:'fadeUp .3s ease'}}>
          <div style={{fontSize:14,fontWeight:700,color:phase===0?'var(--grn)':phase===1?'var(--amb2)':'var(--red2)'}}>
            {phase===0?'✅ Normal resting heart rate detected':phase===1?'⚠️ Elevated BPM — stress or exertion detected':'🚨 Critical reading — cardiac event sequence'}
          </div>
          <div style={{marginTop:6}}>
            <div className="pbar">
              <div className="pfill" style={{width:`${(bpm/200)*100}%`,background:bColor}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--tx3)',marginTop:3}}>
              <span>0</span><span>60</span><span>100</span><span>140</span><span>200</span>
            </div>
          </div>
        </div>
      )}

      <button className={`btn ${monitoring?'btn-red':'btn-grn'}`} onClick={monitoring?stopMon:startMon}>
        {monitoring?'⏹ Stop Monitoring':'▶️ Start Health Monitor'}
      </button>
      <div style={{fontSize:11,color:'var(--tx2)',textAlign:'center',lineHeight:1.5}}>rPPG camera simulation · Demo: normal → elevated → cardiac alert → auto emergency</div>
    </div>
  );
}

function PostAccident(){
  const [tab,setTab]=useState('check');
  const [checks,setChecks]=useState(Array(8).fill(false));
  const [msgs,setMsgs]=useState([{role:'ai',text:"Hi! I'm SafeStreet AI. I can guide you through post-accident steps, insurance claims, and Alabama legal requirements. What happened?"}]);
  const [inp,setInp]=useState('');const [typing,setTyping]=useState(false);
  const LIST=['Move to safe area & activate hazard lights','Check all occupants for injuries','Call 911 if injuries or significant damage','Document the scene with photos & video','Exchange insurance & license plate info','Collect witness names and contacts','File police report (Alabama: required $500+ damage)','Notify your insurance company immediately'];
  async function send(){
    if(!inp.trim())return;const q=inp;setInp('');
    setMsgs(m=>[...m,{role:'user',text:q}]);setTyping(true);
    const r=await askClaude(q,'You are SafeStreet AI post-accident assistant for Montgomery AL. Be calm, concise (2-3 sentences), practical. Alabama law: SR-13 form required within 30 days for $500+ damage or any injury.');
    setTyping(false);setMsgs(m=>[...m,{role:'ai',text:r||'Document the scene, check for injuries, and contact your insurance promptly.'}]);
  }
  const done=checks.filter(Boolean).length;
  return(
    <div className="page fade-up">
      <div style={{padding:'12px 16px 0'}}>
        <div style={{fontFamily:'var(--display)',fontSize:17,fontWeight:900,marginBottom:10}}>🚗 Post-Accident Hub</div>
        <div className="tabs">
          {[['check','✅ Steps'],['ai','🤖 AI Help'],['hosp','🏥 Hospitals'],['police','👮 Police']].map(([k,l])=>(
            <button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
      </div>
      {tab==='check'&&(
        <div className="pg-sm" style={{paddingTop:0}}>
          <div className="csm">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:700}}>Completion</span>
              <span style={{fontSize:13,fontWeight:900,fontFamily:'var(--mono)',color:'var(--grn)'}}>{done}/{LIST.length}</span>
            </div>
            <div className="pbar"><div className="pfill" style={{width:`${(done/LIST.length)*100}%`,background:'linear-gradient(90deg,var(--grn2),var(--grn))'}}/></div>
            {done===LIST.length&&<div style={{fontSize:11,color:'var(--grn)',marginTop:6,fontWeight:700}}>✅ All steps complete! Stay safe.</div>}
          </div>
          {LIST.map((it,i)=>(
            <div key={i} onClick={()=>setChecks(c=>c.map((v,j)=>j===i?!v:v))}
              style={{display:'flex',gap:11,alignItems:'flex-start',padding:'11px 13px',background:'var(--bg2)',
              border:`1.5px solid ${checks[i]?'rgba(34,212,122,.35)':'var(--bd0)'}`,borderRadius:'var(--r-md)',
              cursor:'pointer',transition:'all .2s',animation:checks[i]?'scaleIn .2s ease':'none'}}>
              <div style={{width:22,height:22,borderRadius:7,border:`2px solid ${checks[i]?'var(--grn)':'var(--bd2)'}`,
                background:checks[i]?'var(--grn2)':'transparent',display:'flex',alignItems:'center',
                justifyContent:'center',fontSize:12,flexShrink:0,marginTop:1,transition:'all .2s'}}>{checks[i]?'✓':''}</div>
              <div>
                <span style={{fontSize:13,color:checks[i]?'var(--tx2)':'var(--tx0)',textDecoration:checks[i]?'line-through':'none',lineHeight:1.4}}>{it}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab==='ai'&&(
        <div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 64px - 82px)'}}>
          <div style={{flex:1,overflow:'auto',padding:'8px 16px',display:'flex',flexDirection:'column',gap:9}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',animation:'fadeUp .25s ease'}}>
                <div style={{maxWidth:'84%',padding:'10px 13px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',
                  background:m.role==='user'?'linear-gradient(135deg,#1a5fd4,var(--blu))':'var(--bg3)',
                  fontSize:12,lineHeight:1.55,boxShadow:m.role==='user'?'var(--sh-blu)':'var(--sh-sm)'}}>{m.text}</div>
              </div>
            ))}
            {typing&&<div style={{display:'flex',gap:4,padding:'10px 12px',background:'var(--bg3)',borderRadius:16,width:64}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--tx2)',animation:`blink 1.2s ${i*.2}s infinite`}}/>)}</div>}
          </div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',padding:'5px 16px'}}>
            {['Need a police report?','Handle insurance?','Car is totaled?'].map(q=><span key={q} className="chip" style={{fontSize:10.5}} onClick={()=>setInp(q)}>{q}</span>)}
          </div>
          <div style={{display:'flex',gap:8,padding:'7px 16px 10px'}}>
            <input className="inp" style={{flex:1}} placeholder="Ask anything…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
            <button onClick={send} className="btn btn-blu btn-sm" style={{width:44,padding:0}}>↑</button>
          </div>
        </div>
      )}
      {tab==='hosp'&&(
        <div className="pg-sm" style={{paddingTop:0}}>
          {HOSPITALS.map(h=>(

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                <div><div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{h.name}</div><div style={{fontSize:11,color:'var(--tx2)'}}>{h.addr} · {h.dist}</div></div>
                {h.trauma&&<span className="badge bdg-red">TRAUMA</span>}
              </div>
              <div style={{display:'flex',gap:6}}>
                <a href={navUrl(h.lat,h.lng)} target="_blank" className="btn btn-blu btn-sm" style={{flex:1,fontSize:12}}>📍 Navigate</a>
                <a href={`tel:${h.phone}`} className="btn btn-ghost btn-sm" style={{flex:1,fontSize:12}}>📞 Call</a>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab==='police'&&(
        <div className="pg-sm" style={{paddingTop:0}}>
          <div className="card card-blu">
            <div className="section-hd">⚖️ ALABAMA LAW</div>
            <div style={{fontSize:12,color:'var(--tx1)',lineHeight:1.5}}>SR-13 form required within 30 days for $500+ damage or any injury. Failure to report may affect your insurance claim.</div>
          </div>
          {POLICE.map(p=>(
            <div key={p.id} className="csm">
              <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{p.name}</div>
              <div style={{fontSize:11,color:'var(--tx2)',marginBottom:7}}>{p.addr} · {p.dist} · ETA {p.eta}</div>
              <div style={{display:'flex',gap:6}}>
                <a href={navUrl(p.lat,p.lng)} target="_blank" className="btn btn-blu btn-sm" style={{flex:1,fontSize:12}}>📍 Navigate</a>
                <a href={`tel:${p.phone}`} className="btn btn-ghost btn-sm" style={{flex:1,fontSize:12}}>📞 Call</a>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    {id:'route',icon:'🧭',label:'ROUTE'},
    {id:'sos',icon:'🆘',label:'SOS'},
    {id:'health',icon:'❤️',label:'HEALTH'},
    {id:'dash',icon:'📊',label:'CITY'},
    {id:'help',icon:'🚗',label:'HELP'},
  ];
  return(
    <nav className="nav">
      {items.map(it=>(
        <button key={it.id} className={`nb ${page===it.id?'on':''}`} onClick={()=>setPage(it.id)}>
          {it.dot&&page!=='traffic'&&<span className="ndot"/>}
          <span className="ni">{it.icon}</span>
          <span className="nl">{it.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ══════════════════════════════════════════
   SPLASH
══════════════════════════════════════════ */
function Splash({done}){
  const [prog,setProg]=useState(0);const [txt,setTxt]=useState('Initializing…');
  useEffect(()=>{
    const msgs=['Loading crash data…','Connecting AI…','Mapping traffic zones…','Ready!'];
    let m=0;
    const id=setInterval(()=>setProg(p=>{
      const np=Math.min(p+2.2,100);
      const mi=Math.floor(np/34);if(mi!==m&&mi<msgs.length){m=mi;setTxt(msgs[mi]);}
      if(np>=100){clearInterval(id);setTimeout(done,400);}
      return np;
    }),65);return()=>clearInterval(id);
  },[]);

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,
      background:`radial-gradient(ellipse at 35% 25%,rgba(61,148,255,.15) 0%,rgba(21,196,176,.06) 40%,var(--bg0) 65%)`,
      padding:28}}>
      {/* Ripple icon */}
      <div style={{position:'relative',width:120,height:120}}>
        {[0,1,2].map(i=><div key={i} style={{position:'absolute',inset:-8-i*14,borderRadius:'50%',
          border:`1.5px solid rgba(61,148,255,${0.18-i*.05})`,animation:`ripple 2.4s ${i*.7}s infinite ease-out`}}/>)}
        <div style={{width:120,height:120,borderRadius:'50%',overflow:'hidden',background:'var(--bg3)',
          border:'2px solid rgba(61,148,255,.45)',display:'flex',alignItems:'center',justifyContent:'center',
          animation:'float 3.5s ease-in-out infinite',boxShadow:'0 0 40px rgba(61,148,255,.2)'}}>
          <img src={IMG_ICON} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}} alt="SafeStreet"/>
        </div>
      </div>

      <img src={IMG_MAIN} style={{height:44,objectFit:'contain'}} alt="SafeStreet AI"/>

      <div style={{fontFamily:'var(--display)',fontSize:13,color:'var(--tx2)',letterSpacing:.5,textAlign:'center',lineHeight:1.7}}>
        AI Road Safety · Smart Traffic · CO₂ Tracking<br/>
        <span style={{color:'var(--tx3)'}}>Montgomery, Alabama</span>
      </div>

      {/* Progress bar */}
      <div style={{width:'100%',maxWidth:260}}>
        <div style={{height:3,background:'var(--bg4)',borderRadius:2,overflow:'hidden',marginBottom:8}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,var(--blu),var(--teal))',borderRadius:2,
            width:`${prog}%`,transition:'width .1s linear',
            boxShadow:'0 0 8px rgba(61,148,255,.5)'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--tx3)'}}>
          <span>{txt}</span>
          <span style={{fontFamily:'var(--mono)'}}>{Math.round(prog)}%</span>
        </div>
      </div>

      {/* Trust badges */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
        {['🛡️ Safe','🤖 AI Powered','📍 GPS Aware','🔒 Private'].map(b=>(
          <span key={b} className="badge bdg-blu" style={{fontSize:10}}>{b}</span>
        ))}
      </div>

      {/* Team logo */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,marginTop:4,opacity:.7}}>
        <img src={IMG_TEAM} style={{height:30,objectFit:'contain'}} alt="DeepBuild Warriors"/>
        <div style={{fontSize:9,color:'var(--tx3)',textAlign:'center'}}>DeepBuild Warriors · AI Innovation & Competition<br/>WWV Hackathon 2026</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState('splash');
  const [co2Miles,setCo2Miles]=useState(0);
  const [vType,setVType]=useState('sedan');
  const [voiceAlert,setVoiceAlert]=useState(null);
  const [showOnboard,setShowOnboard]=useState(false);

  useEffect(()=>{
    if(screen!=='splash'){
      const id=setInterval(()=>setCo2Miles(m=>m+0.004),3000);
      return()=>clearInterval(id);
    }
  },[screen]);

  // Clear voice alert after show
  useEffect(()=>{if(voiceAlert){const t=setTimeout(()=>setVoiceAlert(null),7000);return()=>clearTimeout(t);}},[voiceAlert]);

  const goFromSplash=()=>{setShowOnboard(true);setScreen('loading');};

  if(screen==='splash')return <Splash done={goFromSplash}/>;
  if(showOnboard)return <Onboarding onDone={()=>{setShowOnboard(false);setScreen('map');}}/>;

  const page=screen;
  const setPage=(p)=>setScreen(p);

  const SCREENS={
    map:<MapHome setPage={setPage} voiceAlert={voiceAlert} setVoiceAlert={setVoiceAlert}/>,
    traffic:<TrafficScreen setPage={setPage} voiceAlert={voiceAlert} setVoiceAlert={setVoiceAlert}/>,
    route:<RouteCheck setPage={setPage} setVoiceAlert={setVoiceAlert}/>,
    sos:<SOSScreen/>,
    health:<HealthMonitor setVoiceAlert={setVoiceAlert}/>,
    dash:<Dashboard/>,
    help:<PostAccident/>,
    nearby:<NearbyScreen setPage={setPage}/>,
    responder:<ResponderScreen/>,
  };

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
      {/* Voice alert banner */}
      {voiceAlert&&<VoiceAlertBanner msg={voiceAlert} onDismiss={()=>setVoiceAlert(null)}/>}

      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {SCREENS[page]||SCREENS.map}
      </div>

      {/* CO2 widget */}
      {page!=='sos'&&page!=='splash'&&(
        <CO2Widget miles={co2Miles} vType={vType} onOpen={()=>setPage('traffic')}/>
      )}

      <NavBar page={page} setPage={setPage}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
