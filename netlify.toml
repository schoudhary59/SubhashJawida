[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=*, geolocation=*, microphone=*"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://*.cartocdn.com https://*.basemaps.cartocdn.com https://api.anthropic.com https://nominatim.openstreetmap.org data:; img-src * data: blob:; connect-src *; media-src *;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
